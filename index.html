<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGINT – Keyword Monitor</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0F;color:#E8E8ED;font-family:'JetBrains Mono','Fira Code',monospace}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0A0A0F}::-webkit-scrollbar-thumb{background:#2A2A35;border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .arow{animation:slideIn .3s ease-out}.arow:hover{background:#14141F!important}
  .kt{transition:all .15s;cursor:pointer}.kt:hover{transform:scale(1.05);filter:brightness(1.3)}
  .st{transition:all .15s;cursor:pointer}.st:hover{filter:brightness(1.2)}
  .b{transition:all .15s;cursor:pointer;border:none;font-family:inherit}.b:hover{filter:brightness(1.2);transform:translateY(-1px)}
  .sl{color:#5A8FD4;text-decoration:none;font-size:10px;font-family:inherit;padding:2px 7px;border-radius:3px;background:#5A8FD412;border:1px solid #5A8FD422}
  .sl:hover{color:#A0C8FF;background:#5A8FD425}
  select,input{font-family:inherit;appearance:none;-webkit-appearance:none}
  @keyframes td{0%{content:'.'} 33%{content:'..'} 66%{content:'...'}100%{content:'.'}}
  .thk::after{content:'.';animation:td 1.2s infinite steps(1)}
  .cm{animation:slideIn .2s ease-out}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var h = React.useState, ue = React.useEffect;

var API = window.location.port ? (window.location.protocol + "//" + window.location.hostname + ":" + window.location.port) : window.location.origin;

var SRC = [
  {id:"truthsocial",name:"Truth Social",icon:"📢",color:"#5448C8"},
  {id:"x_twitter",name:"X / Twitter",icon:"𝕏",color:"#1DA1F2"},
  {id:"reuters",name:"Reuters",icon:"◉",color:"#FF8000"},
  {id:"ap_news",name:"AP News",icon:"◆",color:"#E4002B"},
  {id:"bloomberg",name:"Bloomberg",icon:"▮",color:"#472F92"},
  {id:"cnbc",name:"CNBC",icon:"▶",color:"#005594"},
  {id:"wsj",name:"WSJ",icon:"▣",color:"#0274B6"},
  {id:"foxnews",name:"Fox News",icon:"★",color:"#003366"},
  {id:"cnn",name:"CNN",icon:"◼",color:"#CC0000"},
  {id:"nytimes",name:"NYT",icon:"⬡",color:"#888"},
  {id:"ft",name:"FT",icon:"▤",color:"#FCD0A1"},
  {id:"marketwatch",name:"MarketWatch",icon:"◈",color:"#16A085"},
  {id:"yahoo_finance",name:"Yahoo Finance",icon:"▶",color:"#7B0099"},
  {id:"google_news",name:"Google News",icon:"◎",color:"#4285F4"},
  {id:"whitehouse",name:"White House",icon:"🏛",color:"#3C3B6E"},
  {id:"sec_edgar",name:"SEC",icon:"📋",color:"#002868"},
  {id:"federal_register",name:"Fed Register",icon:"📜",color:"#B22234"},
  {id:"congress",name:"Congress",icon:"⚖",color:"#002868"},
  {id:"fed_reserve",name:"Fed Reserve",icon:"🏦",color:"#1B4D3E"},
  {id:"treasury",name:"Treasury",icon:"💵",color:"#003366"},
  {id:"eia",name:"EIA",icon:"⛽",color:"#2ECC71"},
  {id:"opec",name:"OPEC",icon:"🛢",color:"#1ABC9C"},
  {id:"coindesk",name:"CoinDesk",icon:"₿",color:"#F7931A"},
  {id:"cointelegraph",name:"CoinTelegraph",icon:"₿",color:"#27AE60"},
  {id:"newsapi",name:"NewsAPI",icon:"📰",color:"#E74C3C"},
];
var SM = {}; SRC.forEach(function(s){SM[s.id]=s;});

function ago(iso){var s=Math.floor((Date.now()-new Date(iso))/1000);if(s<0)return"now";if(s<60)return s+"s";if(s<3600)return Math.floor(s/60)+"m";if(s<86400)return Math.floor(s/3600)+"h";return Math.floor(s/86400)+"d";}
function F(url,opt){return fetch(API+url,opt).then(function(r){return r.json()});}

function App(){
  var s=h,u=ue;
  var[kw,sKw]=s([]);var[nk,sNk]=s("");var[al,sAl]=s([]);var[fi,sFi]=s("all");var[sf,sSf]=s("all");
  var[mon,sMon]=s(true);var[cfg,sCfg]=s(false);var[es,sEs]=s(SRC.map(function(x){return x.id}));
  var[conn,sConn]=s(false);var[acc,sAcc]=s([]);var[nau,sNau]=s("");var[ae,sAe]=s("");
  var[ref,sRef]=s(false);var[stf,sStf]=s("all");var[imf,sImf]=s("all");
  var[ss,sSs]=s({});var[ct,sCt]=s("general");var[exp,sExp]=s(new Set());
  var[mv,sMv]=s("alerts");var[idx,sIdx]=s({});var[wl,sWl]=s([]);var[wq,sWq]=s({});
  var[ns,sNs]=s("");var[sel,sSel]=s(null);var[rng,sRng]=s("1d");
  var[ci,sCi]=s({});var[ch,sCh]=s({});var[cl,sCl]=s(null);
  var[toast,sToast]=s("");var[nsn,sNsn]=s("");var[iaw,sIaw]=s({});
  var[acd,sAcd]=s(null);var[at,sAt]=s("stock");var[ade,sAde]=s("");var[adg,sAdg]=s(false);
  var[mn,sMn]=s([]);var[sn,sSn]=s([]);var[mns,sMns]=s({});
  var[fg,sFg]=s(null);var[fd,sFd]=s(null);var[hn,sHn]=s([]);var[bt,sBt]=s(null);
  var[tk,sTk]=s(0);
  // Correction modal
  var[corrUrl,sCorrUrl]=s(null);
  var[corrCtx,sCorrCtx]=s("");
  // Indices config

  var[showIdxPick,sShowIdxPick]=s(false);
  // Stock detail popup

  var[chartType,sChartType]=s("line");

  var submitCorrection=function(impact){
    if(!corrUrl)return;
    fetch(API+"/api/data/correct",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({url:corrUrl,corrected_impact:impact,context:corrCtx})}).then(function(r){return r.json()}).then(function(d){
      if(d.status==="corrected"){
        tt("Corrected: "+d.original_impact+" → "+d.corrected_impact);
        sAl(function(p){return p.map(function(x){
          if(x.url!==corrUrl)return x;
          var up=Object.assign({},x,{user_corrected:true});
          if(impact==="duplicate"){up.is_duplicate=true}
          else{up.market_impact=impact;var tm={bullish:"positive",bearish:"negative",neutral:"neutral"};up.article_tone=tm[impact]||"neutral";up.sentiment=up.article_tone}
          return up;
        })});
        sCorrUrl(null);sCorrCtx("");
      }
    }).catch(function(){tt("Failed")});
  };

  // Send general chat message
  var sendGcMsg=function(){
    var q=gcInput.trim();
    if(!q||gcLoading)return;
    sGcInput("");sGcLoading(true);
    sGcMsgs(function(p){return p.concat([{role:"user",text:q}])});
    fetch(API+"/api/chat/general",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({question:q,history:gcMsgs,tab:mv})}).then(function(r){return r.json()}).then(function(d){
      var answer=d.answer||d.error||"No response";
      var meta="";
      if(d.context_articles)meta=" (referenced "+d.context_articles+" articles)";
      sGcMsgs(function(p){return p.concat([{role:"ai",text:answer,meta:meta}])});
      sGcLoading(false);
    }).catch(function(){
      sGcMsgs(function(p){return p.concat([{role:"ai",text:"Failed to reach Ollama. Check that ollama_url is set in config.json and your GPU server is running."}])});
      sGcLoading(false);
    });
  };

  // Init
  u(function(){
    F("/api/keywords").then(function(d){if(d.keywords)sKw(d.keywords);sConn(true)}).catch(function(){sConn(false)});
    F("/api/accounts").then(function(d){if(d.accounts)sAcc(d.accounts)}).catch(function(){});
    F("/api/signal-sets").then(function(d){if(d.sets)sSs(d.sets)}).catch(function(){});
  },[]);
  // Status poll
  u(function(){var iv=setInterval(function(){fetch(API+"/api/status").then(function(r){if(r.ok)sConn(true);else throw 0}).catch(function(){sConn(false)})},15000);return function(){clearInterval(iv)}},[]);
  // Alert poll
  u(function(){if(!mon)return;var c=false;var p=function(){F("/api/alerts?limit=300").then(function(d){if(!c&&d.alerts){sAl(d.alerts);sConn(true)}}).catch(function(){if(!c)sConn(false)})};p();var iv=setInterval(p,8000);return function(){c=true;clearInterval(iv)}},[mon]);
  // Tick
  u(function(){var iv=setInterval(function(){sTk(function(t){return t+1})},10000);return function(){clearInterval(iv)}},[]);
  // Market
  u(function(){if(mv!=="market")return;var ld=function(){var iv2=rng==="1d"?"5m":rng==="5d"?"15m":"1d";F("/api/market/indices?range="+rng+"&interval="+iv2).then(function(d){if(d.indices)sIdx(d.indices)}).catch(function(){});F("/api/market/watchlist").then(function(d){if(d.watchlist)sWl(d.watchlist);if(d.quotes)sWq(d.quotes)}).catch(function(){});F("/api/market/news").then(function(d){if(d.articles)sMn(d.articles)}).catch(function(){});F("/api/market/news-sources").then(function(d){if(d.sources)sMns(d.sources)}).catch(function(){});F("/api/market/indices/config").then(function(d){if(d.available)sIdxCfg(d)}).catch(function(){})};ld();var iv=setInterval(ld,60000);return function(){clearInterval(iv)}},[mv,rng]);
  // Analytics
  u(function(){if(mv!=="analytics")return;F("/api/data/accuracy").then(function(d){sAcd(d)}).catch(function(){})},[mv]);
  // Economy
  u(function(){if(mv!=="economy")return;F("/api/market/fear-greed").then(function(d){if(d.fear_greed)sFg(d.fear_greed)}).catch(function(){});F("/api/economy/fred-dashboard").then(function(d){if(d.indicators)sFd(d.indicators)}).catch(function(){});F("/api/news/hackernews?limit=10").then(function(d){if(d.stories)sHn(d.stories)}).catch(function(){});F("/api/crypto/binance/BTC").then(function(d){if(!d.error)sBt(d)}).catch(function(){})},[mv]);

  // Sparkline
  var Sp=function(p){if(!p.data||p.data.length<2)return null;var v=p.data.map(function(d){return d.close});var mi=Math.min.apply(null,v),ma=Math.max.apply(null,v),r=ma-mi||1;var pts=v.map(function(val,i){return(i/(v.length-1))*p.width+","+(p.height-((val-mi)/r)*p.height)}).join(" ");return <svg width={p.width} height={p.height} style={{display:"block"}}><polyline points={pts} fill="none" stroke={p.color} strokeWidth="1.5"/></svg>};

  var filt=al.filter(function(a){if(fi!=="all"&&a.keyword!==fi)return false;if(sf!=="all"&&a.severity!==sf)return false;if(stf!=="all"&&(a.article_tone||a.sentiment)!==stf)return false;if(imf!=="all"&&(a.market_impact||"neutral")!==imf)return false;return es.includes(a.source)});

  var iC={bullish:"#34C759",bearish:"#FF3B30",neutral:"#8E8E93"};
  var tC={positive:"#34C759",negative:"#FF3B30",neutral:"#8E8E93"};
  var svC={high:"#FF3B30",medium:"#FF9500",low:"#34C759"};

  return <div style={{minHeight:"100vh"}}>
    {toast&&<div style={{position:"fixed",top:20,right:20,zIndex:100,background:"#1A2A1A",color:"#34C759",padding:"10px 18px",borderRadius:8,fontSize:12,border:"1px solid #34C75933",animation:"slideIn 0.3s ease-out"}}>{toast}</div>}

      {/* Correction Modal */}
      {corrUrl&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={function(){sCorrUrl(null);sCorrCtx("")}}>
        <div style={{background:"#14141F",borderRadius:12,padding:24,border:"1px solid #2A2A35",width:380,maxWidth:"90vw"}} onClick={function(e){e.stopPropagation()}}>
          <div style={{fontSize:12,fontWeight:600,color:"#E8E8ED",marginBottom:16}}>Correct Classification</div>
          <div style={{fontSize:10,color:"#555",marginBottom:12}}>What is the correct market impact?</div>
          <div style={{display:"flex",gap:8,marginBottom:16}}>
            <button className="b" onClick={function(){submitCorrection("bullish")}} style={{flex:1,padding:"10px",borderRadius:8,background:"#34C75915",color:"#34C759",border:"1px solid #34C75933",fontSize:12,fontWeight:600}}>📈 Bullish</button>
            <button className="b" onClick={function(){submitCorrection("neutral")}} style={{flex:1,padding:"10px",borderRadius:8,background:"#8E8E9315",color:"#8E8E93",border:"1px solid #8E8E9333",fontSize:12,fontWeight:600}}>➡️ Neutral</button>
            <button className="b" onClick={function(){submitCorrection("bearish")}} style={{flex:1,padding:"10px",borderRadius:8,background:"#FF3B3015",color:"#FF3B30",border:"1px solid #FF3B3033",fontSize:12,fontWeight:600}}>📉 Bearish</button>
          </div>
          <button className="b" onClick={function(){submitCorrection("duplicate")}} style={{width:"100%",padding:"8px",borderRadius:6,background:"#FF950010",color:"#FF9500",border:"1px solid #FF950033",fontSize:11,marginBottom:16}}>🔄 Mark as Duplicate</button>
          <div style={{fontSize:10,color:"#555",marginBottom:6}}>Why? (optional — helps AI learn)</div>
          <textarea value={corrCtx} onChange={function(e){sCorrCtx(e.target.value)}} placeholder={"e.g. Oil price surge is bearish for equities due to inflation pressure..."} rows={3} style={{width:"100%",background:"#0A0A0F",border:"1px solid #2A2A35",borderRadius:6,padding:"8px",color:"#E8E8ED",fontSize:11,outline:"none",resize:"vertical",fontFamily:"inherit"}}/>
          <button className="b" onClick={function(){sCorrUrl(null);sCorrCtx("")}} style={{marginTop:12,width:"100%",padding:"8px",borderRadius:6,background:"transparent",color:"#555",border:"1px solid #2A2A35",fontSize:11}}>Cancel</button>
        </div>
      </div>}

      {/* Stock Detail Popup */}
      {detailSym&&wq[detailSym]&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={function(){sDetailSym(null)}}>
        <div style={{background:"#14141F",borderRadius:12,padding:24,border:"1px solid #2A2A35",width:600,maxWidth:"95vw",maxHeight:"85vh",overflowY:"auto"}} onClick={function(e){e.stopPropagation()}}>
          {function(){
            var q=wq[detailSym];if(!q)return null;var up=q.change>=0;
            var cd=q.chart||[];
            // Build SVG chart
            var cw=550,ch2=220;
            var chartSvg="";
            if(cd.length>1){
              var mn2=999999,mx2=0;
              cd.forEach(function(d){var hi=d.high||d.close;var lo=d.low||d.close;if(hi>mx2)mx2=hi;if(lo<mn2)mn2=lo});
              var rn=mx2-mn2||1;
              if(chartType==="candle"){
                var bw=Math.max(1,Math.floor(cw/cd.length)-1);
                chartSvg=cd.map(function(d,i){
                  var x=Math.floor((i/(cd.length-1))*cw);
                  var o=d.open||d.close;var c2=d.close;var hi=d.high||Math.max(o,c2);var lo=d.low||Math.min(o,c2);
                  var yhi=ch2-((hi-mn2)/rn)*ch2;var ylo=ch2-((lo-mn2)/rn)*ch2;
                  var yo=ch2-((o-mn2)/rn)*ch2;var yc=ch2-((c2-mn2)/rn)*ch2;
                  var col=c2>=o?"#34C759":"#FF3B30";
                  var bodyTop=Math.min(yo,yc);var bodyH=Math.max(Math.abs(yc-yo),1);
                  return '<line x1="'+x+'" y1="'+yhi+'" x2="'+x+'" y2="'+ylo+'" stroke="'+col+'" stroke-width="1"/><rect x="'+(x-bw/2)+'" y="'+bodyTop+'" width="'+bw+'" height="'+bodyH+'" fill="'+col+'"/>';
                }).join("");
              }else{
                var pts=cd.map(function(d,i){return Math.floor((i/(cd.length-1))*cw)+","+Math.floor(ch2-((d.close-mn2)/rn)*ch2)}).join(" ");
                chartSvg='<polyline points="'+pts+'" fill="none" stroke="'+(up?"#34C759":"#FF3B30")+'" stroke-width="1.5"/>';
              }
            }
            return <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
                <div><span style={{fontSize:20,fontWeight:700,color:"#E8E8ED"}}>{detailSym}</span><span style={{fontSize:12,color:"#555",marginLeft:8}}>{q.name}</span></div>
                <button className="b" onClick={function(){sDetailSym(null)}} style={{fontSize:14,color:"#555",background:"none",padding:"4px 8px"}}>✕</button>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:16}}>
                <span style={{fontSize:28,fontWeight:700,color:"#E8E8ED",fontFamily:"'Space Grotesk',sans-serif"}}>{"$"+(q.price||0).toLocaleString()}</span>
                <span style={{fontSize:14,color:up?"#34C759":"#FF3B30",fontWeight:600}}>{up?"▲":"▼"} {q.change} ({q.change_pct}%)</span>
              </div>

                <button className="b" onClick={function(){sChartType("line")}} style={{padding:"4px 12px",borderRadius:4,fontSize:10,background:chartType==="line"?"#5448C8":"#0A0A0F",color:chartType==="line"?"#fff":"#AAA"}}>Line</button>
                <button className="b" onClick={function(){sChartType("candle")}} style={{padding:"4px 12px",borderRadius:4,fontSize:10,background:chartType==="candle"?"#5448C8":"#0A0A0F",color:chartType==="candle"?"#fff":"#AAA"}}>Candlestick</button>
                <div style={{marginLeft:"auto",display:"flex",gap:4}}>
                  {[["1d","1D"],["5d","5D"],["1mo","1M"],["3mo","3M"],["6mo","6M"],["1y","1Y"]].map(function(p){return <button key={p[0]} className="b" onClick={function(){sRng(p[0]);var item=wl.find(function(w){return w.symbol===detailSym});var atype=item?item.type:"stock";var iv2=p[0]==="1d"?"5m":p[0]==="5d"?"15m":"1d";F("/api/market/quote/"+detailSym+"?type="+atype+"&range="+p[0]+"&interval="+iv2).then(function(d){if(d.quote)sWq(function(pr){var n=Object.assign({},pr);n[detailSym]=d.quote;return n})}).catch(function(){})}} style={{padding:"3px 8px",borderRadius:3,fontSize:9,background:rng===p[0]?"#5448C8":"#0A0A0F",color:rng===p[0]?"#fff":"#555"}}>{p[1]}</button>})}
                </div>
              </div>
              <div style={{background:"#0A0A0F",borderRadius:8,padding:8,marginBottom:16}} dangerouslySetInnerHTML={{__html:'<svg viewBox="0 0 '+cw+' '+ch2+'" width="100%" height="'+ch2+'">'+chartSvg+'</svg>'}}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
                {[["Day High","$"+q.day_high],["Day Low","$"+q.day_low],["Prev Close","$"+q.prev_close],["Volume",(q.volume||0).toLocaleString()],["52w High","$"+q.fifty_two_wk_high],["52w Low","$"+q.fifty_two_wk_low],["Exchange",q.exchange||""],["Mkt Cap",q.market_cap?(q.market_cap>1e12?(q.market_cap/1e12).toFixed(1)+"T":q.market_cap>1e9?(q.market_cap/1e9).toFixed(1)+"B":(q.market_cap/1e6).toFixed(0)+"M"):"N/A"],["Type",q.type||"stock"]].map(function(p2){return <div key={p2[0]} style={{fontSize:10}}><span style={{color:"#555"}}>{p2[0]}: </span><span style={{color:"#AAA"}}>{p2[1]}</span></div>})}
              </div>
              {sn.length>0&&<div style={{marginTop:16,borderTop:"1px solid #1A1A25",paddingTop:12}}>
                <div style={{fontSize:10,fontWeight:600,color:"#666",letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>Related News</div>
                {sn.slice(0,8).map(function(n,i){return <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{display:"block",fontSize:11,color:"#AAA",textDecoration:"none",padding:"4px 0",lineHeight:1.4}}>{n.title} <span style={{fontSize:8,color:"#555"}}>{n.source} · {n.published_at}</span></a>})}
              </div>}
            </div>;
          }()}
        </div>
      </div>}

    {/* HEADER */}
    <div style={{borderBottom:"1px solid #1A1A25",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,background:"#0A0A0F",zIndex:10}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:10,height:10,borderRadius:"50%",background:mon?"#34C759":"#FF3B30",animation:mon?"pulse 2s infinite":"none"}}/>
        <span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:18}}>SIGINT</span>
        <span style={{fontSize:9,padding:"2px 8px",borderRadius:4,background:conn?"#1A2A1A":"#2A1A1A",color:conn?"#34C759":"#FF3B30",border:"1px solid "+(conn?"#34C75933":"#FF3B3033")}}>{conn?"● CONNECTED":"✕ DISCONNECTED"}</span>

            return <div key={i} className="cm" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:m.role==="user"?"#5448C8":"#14141F",color:m.role==="user"?"#fff":"#CCC",fontSize:11,lineHeight:1.6,border:m.role==="user"?"none":"1px solid #1A1A25",whiteSpace:"pre-wrap"}}>
                {m.role==="ai"&&<div style={{fontSize:8,color:"#8B80F0",marginBottom:4,fontWeight:600}}>SIGINT AI{m.meta||""}</div>}
                {m.text}
              </div>
            </div>;
          })}

          {gcLoading&&<div className="cm" style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:"12px 12px 12px 2px",background:"#14141F",border:"1px solid #1A1A25",fontSize:11,color:"#8B80F0"}}><span className="thk">Thinking</span></div></div>}
        </div>

        {/* Input */}
        <div style={{padding:"12px 16px",borderTop:"1px solid #1A1A25",flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={gcInput} onChange={function(e){sGcInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey)sendGcMsg()}} placeholder="Ask about news, markets, trends..." disabled={gcLoading} style={{flex:1,background:"#0A0A0F",border:"1px solid #2A2A35",borderRadius:8,padding:"10px 12px",color:"#E8E8ED",fontSize:11,outline:"none",opacity:gcLoading?0.5:1}}/>
            <button className="b" onClick={sendGcMsg} disabled={gcLoading} style={{background:"#5448C8",color:"#fff",padding:"10px 16px",borderRadius:8,fontSize:12,opacity:gcLoading?0.5:1}}>Send</button>
          </div>
        </div>
      </div>}

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
