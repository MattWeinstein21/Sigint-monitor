<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGINT – Keyword Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0F;color:#E8E8ED;font-family:'JetBrains Mono','Fira Code',monospace}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0A0A0F}::-webkit-scrollbar-thumb{background:#2A2A35;border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .alert-row{animation:slideIn .3s ease-out}.alert-row:hover{background:#14141F!important}
  .kw-tag{transition:all .15s;cursor:pointer}.kw-tag:hover{transform:scale(1.05);filter:brightness(1.3)}
  .src-toggle{transition:all .15s;cursor:pointer}.src-toggle:hover{filter:brightness(1.2)}
  .btn{transition:all .15s;cursor:pointer;border:none}.btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
  .src-link{color:#5A8FD4;text-decoration:none;font-size:10px;font-family:inherit;transition:color .15s;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;background:#5A8FD412;border:1px solid #5A8FD422}
  .src-link:hover{color:#A0C8FF;background:#5A8FD425;text-decoration:none}
  select{appearance:none;-webkit-appearance:none}
  @keyframes thinkingDots{0%{content:'.'} 33%{content:'..'} 66%{content:'...'}100%{content:'.'}}
  .thinking::after{content:'.';animation:thinkingDots 1.2s infinite steps(1)}
  .chat-msg{animation:slideIn .2s ease-out}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = `${window.location.protocol}//${window.location.hostname}:${window.location.port || 5000}`;

const SOURCES = [
  // Social
  { id: "truthsocial", name: "Truth Social", icon: "📢", type: "social", color: "#5448C8" },
  { id: "x_twitter", name: "X / Twitter", icon: "𝕏", type: "social", color: "#1DA1F2" },
  // Major News
  { id: "reuters", name: "Reuters", icon: "◉", type: "news", color: "#FF8000" },
  { id: "ap_news", name: "AP News", icon: "◆", type: "news", color: "#E4002B" },
  { id: "bloomberg", name: "Bloomberg", icon: "▮", type: "news", color: "#472F92" },
  { id: "cnbc", name: "CNBC", icon: "▶", type: "news", color: "#005594" },
  { id: "wsj", name: "Wall Street Journal", icon: "▣", type: "news", color: "#0274B6" },
  { id: "foxnews", name: "Fox News", icon: "★", type: "news", color: "#003366" },
  { id: "cnn", name: "CNN", icon: "◼", type: "news", color: "#CC0000" },
  { id: "nytimes", name: "New York Times", icon: "⬡", type: "news", color: "#888" },
  { id: "ft", name: "Financial Times", icon: "▤", type: "news", color: "#FCD0A1" },
  { id: "marketwatch", name: "MarketWatch", icon: "◈", type: "news", color: "#16A085" },
  { id: "yahoo_finance", name: "Yahoo Finance", icon: "◇", type: "news", color: "#6001D2" },
  { id: "google_news", name: "Google News", icon: "●", type: "news", color: "#4285F4" },
  { id: "newsapi", name: "NewsAPI", icon: "◈", type: "news", color: "#4A90D9" },
  // Government
  { id: "whitehouse", name: "White House", icon: "🏛", type: "gov", color: "#002868" },
  { id: "sec_edgar", name: "SEC EDGAR", icon: "📋", type: "gov", color: "#004B87" },
  { id: "federal_register", name: "Federal Register", icon: "📜", type: "gov", color: "#8B4513" },
  { id: "congress", name: "Congress.gov", icon: "🏛", type: "gov", color: "#1C3F6E" },
  { id: "fed_reserve", name: "Federal Reserve", icon: "🏦", type: "gov", color: "#2E5090" },
  { id: "treasury", name: "U.S. Treasury", icon: "💵", type: "gov", color: "#1B5E20" },
  // Energy / Commodities
  { id: "eia", name: "EIA Energy", icon: "⚡", type: "energy", color: "#F4A300" },
  { id: "opec", name: "OPEC", icon: "🛢", type: "energy", color: "#1A237E" },
  // Crypto
  { id: "coindesk", name: "CoinDesk", icon: "₿", type: "crypto", color: "#F7931A" },
  { id: "cointelegraph", name: "CoinTelegraph", icon: "₿", type: "crypto", color: "#27AE60" },
];

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 0) return "just now";
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

function App() {
  const [keywords, setKeywords] = useState([]);
  const [newKeyword, setNewKeyword] = useState("");
  const [alerts, setAlerts] = useState([]);
  const [filter, setFilter] = useState("all");
  const [severityFilter, setSeverityFilter] = useState("all");
  const [isMonitoring, setIsMonitoring] = useState(true);
  const [showConfig, setShowConfig] = useState(false);
  const [enabledSources, setEnabledSources] = useState(SOURCES.map(s => s.id));
  const [backendConnected, setBackendConnected] = useState(false);
  const [lastError, setLastError] = useState("");
  const [accounts, setAccounts] = useState([]);
  const [newAccountUrl, setNewAccountUrl] = useState("");
  const [accountError, setAccountError] = useState("");
  const [refreshing, setRefreshing] = useState(false);
  const [sentimentFilter, setSentimentFilter] = useState("all");
  const [impactFilter, setImpactFilter] = useState("all");
  const [signalSets, setSignalSets] = useState({});
  const [configTab, setConfigTab] = useState("general");
  const [expandedAlerts, setExpandedAlerts] = useState(new Set());
  const [newSignalSentiment, setNewSignalSentiment] = useState("positive");
  const [mainView, setMainView] = useState("alerts"); // "alerts" | "market" | "analytics"
  const [indices, setIndices] = useState({});
  const [watchlist, setWatchlist] = useState([]);
  const [watchlistQuotes, setWatchlistQuotes] = useState({});
  const [newSymbol, setNewSymbol] = useState("");
  const [selectedStock, setSelectedStock] = useState(null);
  const [selectedRange, setSelectedRange] = useState("1d");
  const [chatInputs, setChatInputs] = useState({});
  const [chatHistories, setChatHistories] = useState({});
  const [chatLoading, setChatLoading] = useState(null);
  const [csvSetId, setCsvSetId] = useState("custom");
  const [csvNewLabel, setCsvNewLabel] = useState("");
  const [toast, setToast] = useState("");
  const [newSetName, setNewSetName] = useState("");
  const [inlineAddWord, setInlineAddWord] = useState({});
  const [accuracyData, setAccuracyData] = useState(null);
  const [fgData, setFgData] = useState(null);
  const [fredData, setFredData] = useState(null);
  const [hnStories, setHnStories] = useState([]);
  const [binanceTicker, setBinanceTicker] = useState(null);
  const [, setTick] = useState(0);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 3000); };

  // Load keywords + accounts from backend on mount
  useEffect(() => {
    fetch(API_BASE + "/api/keywords")
      .then(r => r.json())
      .then(d => { if (d.keywords) setKeywords(d.keywords); setBackendConnected(true); })
      .catch(() => setBackendConnected(false));
    fetch(API_BASE + "/api/accounts")
      .then(r => r.json())
      .then(d => { if (d.accounts) setAccounts(d.accounts); })
      .catch(() => {});
    fetch(API_BASE + "/api/signal-sets")
      .then(r => r.json())
      .then(d => { if (d.sets) setSignalSets(d.sets); })
      .catch(() => {});
  }, []);

  // Poll backend status
  useEffect(() => {
    const iv = setInterval(() => {
      fetch(API_BASE + "/api/status")
        .then(r => { if (r.ok) { setBackendConnected(true); setLastError(""); } else throw new Error(); })
        .catch(() => { setBackendConnected(false); setLastError("Cannot reach backend"); });
    }, 15000);
    return () => clearInterval(iv);
  }, []);

  // Poll alerts
  useEffect(() => {
    if (!isMonitoring) return;
    let cancelled = false;
    const poll = () => {
      fetch(API_BASE + "/api/alerts?limit=300")
        .then(r => r.json())
        .then(d => { if (!cancelled && d.alerts) { setAlerts(d.alerts); setBackendConnected(true); } })
        .catch(() => { if (!cancelled) setBackendConnected(false); });
    };
    poll();
    const iv = setInterval(poll, 8000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [isMonitoring]);

  // Timestamp refresh
  useEffect(() => { const iv = setInterval(() => setTick(t => t + 1), 10000); return () => clearInterval(iv); }, []);

  const addKeyword = useCallback(() => {
    const k = newKeyword.trim().toLowerCase();
    if (!k || keywords.includes(k)) return;
    setKeywords(prev => [...prev, k]);
    setNewKeyword("");
    fetch(API_BASE + "/api/keywords", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ add: k })
    }).catch(() => {});
  }, [newKeyword, keywords]);

  const removeKeyword = (k) => {
    setKeywords(prev => prev.filter(x => x !== k));
    fetch(API_BASE + "/api/keywords", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ remove: k })
    }).catch(() => {});
  };

  const addAccount = useCallback(() => {
    const url = newAccountUrl.trim();
    if (!url) return;
    setAccountError("");
    fetch(API_BASE + "/api/accounts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    })
      .then(r => r.json())
      .then(d => {
        if (d.error) { setAccountError(d.error); return; }
        if (d.accounts) setAccounts(d.accounts);
        setNewAccountUrl("");
      })
      .catch(() => setAccountError("Backend unreachable"));
  }, [newAccountUrl]);

  const removeAccount = (platform, username) => {
    fetch(API_BASE + "/api/accounts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ remove: platform + ":" + username })
    })
      .then(r => r.json())
      .then(d => { if (d.accounts) setAccounts(d.accounts); })
      .catch(() => {});
  };

  const triggerRefresh = () => {
    if (refreshing) return;
    setRefreshing(true);
    fetch(API_BASE + "/api/refresh", { method: "POST" })
      .then(() => {
        // Wait a few seconds for the poll cycle to run, then fetch new alerts
        setTimeout(() => {
          fetch(API_BASE + "/api/alerts?limit=300")
            .then(r => r.json())
            .then(d => { if (d.alerts) setAlerts(d.alerts); })
            .catch(() => {})
            .finally(() => setRefreshing(false));
        }, 5000);
      })
      .catch(() => setRefreshing(false));
  };

  const toggleSource = (id) => setEnabledSources(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );

  const toggleExpand = (id) => setExpandedAlerts(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  const toggleSignalSet = (setId) => {
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ toggle: setId })
    }).then(r => r.json()).then(d => { if (d.sets) { setSignalSets(d.sets); showToast(d.sets[setId]?.enabled ? "✓ " + (d.sets[setId]?.label || setId) + " enabled" : "✗ " + (d.sets[setId]?.label || setId) + " disabled"); } }).catch(() => {});
  };

  const addSignalWord = (setId, sentiment, word) => {
    const w = (word || "").trim().toLowerCase();
    if (!w || !setId) return;
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: setId, sentiment, add: w, weight: 2 })
    }).then(r => r.json()).then(d => { if (d.sets) { setSignalSets(d.sets); showToast('✓ Added "' + w + '" to ' + (d.sets[setId]?.label || setId)); setInlineAddWord(prev => ({...prev, [setId]: {word: "", sentiment: prev[setId]?.sentiment || "positive"}})); } }).catch(() => {});
  };

  const removeSignalWord = (setId, sentiment, word) => {
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: setId, sentiment, remove: word })
    }).then(r => r.json()).then(d => { if (d.sets) { setSignalSets(d.sets); showToast('✓ Removed "' + word + '"'); } }).catch(() => {});
  };

  const editSignalWeight = (setId, sentiment, word, newWeight) => {
    fetch(API_BASE + "/api/signal-sets/edit-weight", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: setId, sentiment, word, weight: parseFloat(newWeight) })
    }).then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); }).catch(() => {});
  };

  const createNewSet = () => {
    const name = newSetName.trim();
    if (!name) return;
    const id = name.toLowerCase().replace(/[^a-z0-9]/g, "_");
    const sets = {...signalSets};
    if (sets[id]) { showToast("⚠ Set already exists"); return; }
    sets[id] = { label: name, enabled: true, positive: {}, negative: {} };
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sets })
    }).then(r => r.json()).then(d => { if (d.sets) { setSignalSets(d.sets); setNewSetName(""); showToast('✓ Created set "' + name + '"'); } }).catch(() => {});
  };

  // Market data
  const [assetType, setAssetType] = useState("stock");
  const [addError, setAddError] = useState("");
  const [addingSymbol, setAddingSymbol] = useState(false);
  const [marketNews, setMarketNews] = useState([]);
  const [stockNews, setStockNews] = useState([]);
  const [marketNewsSources, setMarketNewsSources] = useState({});

  useEffect(() => {
    if (mainView !== "market") return;
    const loadMarket = () => {
      fetch(API_BASE + "/api/market/indices?range=" + selectedRange + "&interval=" + (selectedRange === "1d" ? "5m" : selectedRange === "5d" ? "15m" : "1d"))
        .then(r => r.json()).then(d => { if (d.indices) setIndices(d.indices); }).catch(() => {});
      fetch(API_BASE + "/api/market/watchlist")
        .then(r => r.json()).then(d => {
          if (d.watchlist) setWatchlist(d.watchlist);
          if (d.quotes) setWatchlistQuotes(d.quotes);
        }).catch(() => {});
      fetch(API_BASE + "/api/market/news")
        .then(r => r.json()).then(d => { if (d.articles) setMarketNews(d.articles); }).catch(() => {});
      fetch(API_BASE + "/api/market/news-sources")
        .then(r => r.json()).then(d => { if (d.sources) setMarketNewsSources(d.sources); }).catch(() => {});
    };
    loadMarket();
    const iv = setInterval(loadMarket, 60000);
    return () => clearInterval(iv);
  }, [mainView, selectedRange]);

  const addToWatchlist = () => {
    const sym = newSymbol.trim().toUpperCase();
    if (!sym) return;
    setAddingSymbol(true); setAddError("");
    fetch(API_BASE + "/api/market/watchlist", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ add: sym, type: assetType })
    }).then(r => r.json()).then(d => {
      if (d.error) { setAddError(d.error); showToast("⚠ " + d.error); setAddingSymbol(false); return; }
      if (d.watchlist) setWatchlist(d.watchlist);
      setNewSymbol(""); setAddingSymbol(false);
      showToast("✓ Added " + sym + " to watchlist");
      fetch(API_BASE + "/api/market/quote/" + sym + "?type=" + assetType + "&range=" + selectedRange)
        .then(r => r.json()).then(qd => { if (qd.quote) setWatchlistQuotes(prev => ({...prev, [sym]: qd.quote})); }).catch(() => {});
    }).catch(() => { setAddError("Network error"); setAddingSymbol(false); });
  };

  const removeFromWatchlist = (sym) => {
    fetch(API_BASE + "/api/market/watchlist", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ remove: sym }) })
      .then(r => r.json()).then(d => { if (d.watchlist) setWatchlist(d.watchlist); showToast("✓ Removed " + sym); }).catch(() => {});
    setWatchlistQuotes(prev => { const n = {...prev}; delete n[sym]; return n; });
    if (selectedStock === sym) setSelectedStock(null);
  };

  const selectStock = (sym) => {
    const item = watchlist.find(w => w.symbol === sym);
    const atype = item ? item.type : "stock";
    setSelectedStock(selectedStock === sym ? null : sym);
    setStockNews([]);
    fetch(API_BASE + "/api/market/quote/" + sym + "?type=" + atype + "&range=" + selectedRange + "&interval=" + (selectedRange === "1d" ? "5m" : selectedRange === "5d" ? "15m" : "1d"))
      .then(r => r.json()).then(d => { if (d.quote) setWatchlistQuotes(prev => ({...prev, [sym]: d.quote})); }).catch(() => {});
    // Fetch news for this symbol
    fetch(API_BASE + "/api/market/news?symbol=" + sym)
      .then(r => r.json()).then(d => { if (d.articles) setStockNews(d.articles); }).catch(() => {});
  };

  const toggleMarketNewsSource = (srcId) => {
    fetch(API_BASE + "/api/market/news-sources", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ toggle: srcId }) })
      .then(r => r.json()).then(d => { if (d.sources) setMarketNewsSources(d.sources); }).catch(() => {});
  };

  // Ollama chat
  const askFollowUp = (alertId) => {
    const question = (chatInputs[alertId] || "").trim();
    if (!question) return;
    setChatInputs(prev => ({...prev, [alertId]: ""}));
    setChatLoading(alertId);

    // Add user message to history immediately
    setChatHistories(prev => {
      const history = prev[alertId] || [];
      return {...prev, [alertId]: [...history, {role: "user", text: question}]};
    });

    // Get current history for context
    const currentHistory = chatHistories[alertId] || [];

    fetch(API_BASE + "/api/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ alert_id: alertId, question, history: currentHistory })
    })
      .then(r => r.json())
      .then(d => {
        const answer = d.answer || d.error || "No response";
        setChatHistories(prev => {
          const history = prev[alertId] || [];
          return {...prev, [alertId]: [...history, {role: "ai", text: answer}]};
        });
        setChatLoading(null);
      })
      .catch(() => {
        setChatHistories(prev => {
          const history = prev[alertId] || [];
          return {...prev, [alertId]: [...history, {role: "ai", text: "Failed to reach Ollama"}]};
        });
        setChatLoading(null);
      });
  };

  // CSV import
  const importCsv = (file, setId) => {
    if (!file) return;
    const formData = new FormData();
    formData.append("file", file);
    formData.append("set_id", setId || "custom");
    fetch(API_BASE + "/api/signal-sets/import", { method: "POST", body: formData })
      .then(r => r.json()).then(d => {
        if (d.sets) { setSignalSets(d.sets); showToast("✓ Imported " + (d.added || 0) + " words"); }
        else if (d.error) showToast("⚠ " + d.error);
      }).catch(() => showToast("⚠ Import failed"));
  };

  // Sentiment correction — user tells us we got it wrong
  const correctSentiment = (url, corrected) => {
    fetch(API_BASE + "/api/data/correct", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, corrected_sentiment: corrected })
    }).then(r => r.json()).then(d => {
      if (d.status === "corrected") {
        showToast("✓ Correction logged: " + d.original + " → " + d.corrected);
        // Update local alert
        setAlerts(prev => prev.map(a => a.url === url ? {...a, sentiment: corrected, article_tone: corrected, user_corrected: true} : a));
      } else if (d.error) showToast("⚠ " + d.error);
    }).catch(() => showToast("⚠ Correction failed"));
  };

  // Analytics data loading
  useEffect(() => {
    if (mainView !== "analytics") return;
    fetch(API_BASE + "/api/data/accuracy")
      .then(r => r.json()).then(d => setAccuracyData(d)).catch(() => {});
  }, [mainView]);

  // Economy data loading
  useEffect(() => {
    if (mainView !== "economy") return;
    fetch(API_BASE + "/api/market/fear-greed").then(r => r.json()).then(d => { if (d.fear_greed) setFgData(d.fear_greed); }).catch(() => {});
    fetch(API_BASE + "/api/economy/fred-dashboard").then(r => r.json()).then(d => { if (d.indicators) setFredData(d.indicators); }).catch(() => {});
    fetch(API_BASE + "/api/news/hackernews?limit=10").then(r => r.json()).then(d => { if (d.stories) setHnStories(d.stories); }).catch(() => {});
    fetch(API_BASE + "/api/crypto/binance/BTC").then(r => r.json()).then(d => { if (!d.error) setBinanceTicker(d); }).catch(() => {});
  }, [mainView]);

  const applyRecalibration = () => {
    fetch(API_BASE + "/api/data/apply-recalibration", { method: "POST" })
      .then(r => r.json()).then(d => {
        if (d.adjustments && d.adjustments.length > 0) {
          showToast("✓ Applied " + d.adjustments.length + " weight adjustments");
          if (d.sets) setSignalSets(d.sets);
        } else {
          showToast("ℹ No adjustments needed — need more correction data");
        }
      }).catch(() => showToast("⚠ Recalibration failed"));
  };

  // Mini sparkline SVG component
  const Sparkline = ({data, width, height, color}) => {
    if (!data || data.length < 2) return null;
    const vals = data.map(d => d.close);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min || 1;
    const points = vals.map((v, i) => `${(i / (vals.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
    return <svg width={width} height={height} style={{display:"block"}}><polyline points={points} fill="none" stroke={color} strokeWidth="1.5"/></svg>;
  };

  const filtered = alerts.filter(a => {
    if (filter !== "all" && a.keyword !== filter) return false;
    if (severityFilter !== "all" && a.severity !== severityFilter) return false;
    if (sentimentFilter !== "all" && (a.article_tone || a.sentiment) !== sentimentFilter) return false;
    if (impactFilter !== "all" && (a.market_impact || "neutral") !== impactFilter) return false;
    return enabledSources.includes(a.source);
  });

  const sevColors = { high: "#FF3B30", medium: "#FF9500", low: "#34C759" };
  const sentColors = { positive: "#34C759", negative: "#FF3B30", neutral: "#8E8E93" };
  const sentIcons = { positive: "📈", negative: "📉", neutral: "➡️" };
  const srcMap = Object.fromEntries(SOURCES.map(s => [s.id, s]));

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Toast notification */}
      {toast && (
        <div style={{ position: "fixed", top: 20, right: 20, zIndex: 100, background: toast.startsWith("⚠") ? "#2A1A1A" : "#1A2A1A", color: toast.startsWith("⚠") ? "#FF9500" : "#34C759", padding: "10px 18px", borderRadius: 8, fontSize: 12, border: "1px solid " + (toast.startsWith("⚠") ? "#FF950033" : "#34C75933"), animation: "slideIn 0.3s ease-out", fontFamily: "inherit" }}>
          {toast}
        </div>
      )}
      {/* Header */}
      <div style={{ borderBottom: "1px solid #1A1A25", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: "#0A0A0F", zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: isMonitoring ? "#34C759" : "#FF3B30", animation: isMonitoring ? "pulse 2s infinite" : "none" }} />
          <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 18, letterSpacing: "-0.5px" }}>SIGINT</span>
          <span style={{ fontSize: 11, color: "#555", marginLeft: 4 }}>keyword monitor</span>
          <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, marginLeft: 8, background: backendConnected ? "#1A2A1A" : "#2A1A1A", color: backendConnected ? "#34C759" : "#FF3B30", border: "1px solid " + (backendConnected ? "#34C75933" : "#FF3B3033") }}>
            {backendConnected ? "● CONNECTED" : "✕ DISCONNECTED"}
          </span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={() => setMainView("alerts")} style={{ background: mainView === "alerts" ? "#5448C8" : "#14141F", color: mainView === "alerts" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>📋 Alerts</button>
          <button className="btn" onClick={() => setMainView("market")} style={{ background: mainView === "market" ? "#5448C8" : "#14141F", color: mainView === "market" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>📊 Markets</button>
          <button className="btn" onClick={() => setMainView("economy")} style={{ background: mainView === "economy" ? "#5448C8" : "#14141F", color: mainView === "economy" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>🏛 Economy</button>
          <button className="btn" onClick={() => setMainView("analytics")} style={{ background: mainView === "analytics" ? "#5448C8" : "#14141F", color: mainView === "analytics" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>🎯 Accuracy</button>
          <button className="btn" onClick={triggerRefresh} disabled={refreshing} style={{ background: refreshing ? "#2A2A35" : "#14141F", color: refreshing ? "#666" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12, opacity: refreshing ? 0.7 : 1 }}>
            {refreshing ? "⟳ Polling..." : "⟳ Refresh"}
          </button>
          <button className="btn" onClick={() => setShowConfig(!showConfig)} style={{ background: showConfig ? "#2A2A35" : "#14141F", color: "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>⚙ Config</button>
          <button className="btn" onClick={() => setIsMonitoring(!isMonitoring)} style={{ background: isMonitoring ? "#1A2A1A" : "#2A1A1A", color: isMonitoring ? "#34C759" : "#FF3B30", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>
            {isMonitoring ? "● LIVE" : "■ PAUSED"}
          </button>
        </div>
      </div>

      {/* Connection error banner */}
      {!backendConnected && (
        <div style={{ background: "#2A1A1A", borderBottom: "1px solid #FF3B3033", padding: "8px 24px", fontSize: 11, color: "#FF6B6B" }}>
          ⚠ Backend not reachable at {API_BASE} — make sure monitor.py is running.
        </div>
      )}

      <div style={{ display: "flex", height: backendConnected ? "calc(100vh - 57px)" : "calc(100vh - 89px)" }}>
        {/* Sidebar */}
        <div style={{ width: showConfig ? 360 : 0, overflow: "hidden", transition: "width 0.3s", borderRight: "1px solid #1A1A25", flexShrink: 0 }}>
          <div style={{ width: 360, padding: 0, overflowY: "auto", height: "100%" }}>
            {/* Config tabs */}
            <div style={{ display: "flex", borderBottom: "1px solid #1A1A25" }}>
              {[{id:"general",label:"General"},{id:"signals",label:"Signal Words"},{id:"sources",label:"Sources"}].map(tab => (
                <button key={tab.id} className="btn" onClick={() => setConfigTab(tab.id)} style={{ flex: 1, padding: "8px 0", fontSize: 10, letterSpacing: 1, textTransform: "uppercase", background: configTab === tab.id ? "#14141F" : "transparent", color: configTab === tab.id ? "#E8E8ED" : "#555", borderBottom: configTab === tab.id ? "2px solid #5448C8" : "2px solid transparent" }}>{tab.label}</button>
              ))}
            </div>

            <div style={{ padding: 16 }}>
            {configTab === "general" && (<>
              {/* Keywords */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Keywords ({keywords.length})</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                  <input value={newKeyword} onChange={e => setNewKeyword(e.target.value)} onKeyDown={e => e.key === "Enter" && addKeyword()} placeholder="add keyword..." style={{ flex: 1, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "6px 10px", color: "#E8E8ED", fontSize: 12, outline: "none", fontFamily: "inherit" }} />
                  <button className="btn" onClick={addKeyword} style={{ background: "#5448C8", color: "#fff", padding: "6px 12px", borderRadius: 6, fontSize: 12 }}>+</button>
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, maxHeight: 200, overflowY: "auto" }}>
                  {keywords.map(k => <span key={k} className="kw-tag" onClick={() => removeKeyword(k)} style={{ background: "#1A1A25", padding: "4px 10px", borderRadius: 4, fontSize: 11, color: "#AAA", display: "flex", alignItems: "center", gap: 6 }}>{k} <span style={{ color: "#555", fontSize: 10 }}>✕</span></span>)}
                </div>
              </div>

              {/* Monitored Accounts */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Monitored Accounts ({accounts.length})</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                  <input value={newAccountUrl} onChange={e => { setNewAccountUrl(e.target.value); setAccountError(""); }} onKeyDown={e => e.key === "Enter" && addAccount()} placeholder="paste profile URL..." style={{ flex: 1, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "6px 10px", color: "#E8E8ED", fontSize: 11, outline: "none", fontFamily: "inherit" }} />
                  <button className="btn" onClick={addAccount} style={{ background: "#5448C8", color: "#fff", padding: "6px 12px", borderRadius: 6, fontSize: 12 }}>+</button>
                </div>
                <div style={{ fontSize: 9, color: "#555", marginBottom: 6 }}>x.com/username · truthsocial.com/@username</div>
                {accountError && <div style={{ fontSize: 10, color: "#FF3B30", marginBottom: 6 }}>⚠ {accountError}</div>}
                <div style={{ display: "flex", flexDirection: "column", gap: 4, maxHeight: 180, overflowY: "auto" }}>
                  {accounts.map(a => (
                    <div key={a.platform + ":" + a.username} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 8px", borderRadius: 6, background: "#14141F" }}>
                      <span style={{ fontSize: 14, flexShrink: 0 }}>{a.platform === "x" ? "𝕏" : "📢"}</span>
                      <a href={(a.platform === "x" ? "https://x.com/" : "https://truthsocial.com/@") + a.username} target="_blank" rel="noopener noreferrer" style={{ fontSize: 11, color: "#CCC", textDecoration: "none", flex: 1 }}>@{a.username}</a>
                      <span className="kw-tag" onClick={() => removeAccount(a.platform, a.username)} style={{ fontSize: 10, color: "#555", padding: "2px 4px" }}>✕</span>
                    </div>
                  ))}
                </div>
              </div>
            </>)}

            {configTab === "signals" && (<>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Signal Word Sets</div>

              {/* Create new set */}
              <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
                <input value={newSetName} onChange={e => setNewSetName(e.target.value)} onKeyDown={e => e.key === "Enter" && createNewSet()} placeholder="New set name..." style={{ flex: 1, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "6px 10px", color: "#E8E8ED", fontSize: 11, outline: "none", fontFamily: "inherit" }} />
                <button className="btn" onClick={createNewSet} style={{ background: "#5448C8", color: "#fff", padding: "6px 12px", borderRadius: 6, fontSize: 11 }}>+ Set</button>
              </div>

              {/* Signal set list */}
              <div style={{ display: "flex", flexDirection: "column", gap: 8, maxHeight: "calc(100vh - 240px)", overflowY: "auto" }}>
                {Object.entries(signalSets).map(([setId, set]) => {
                  const isSetExpanded = expandedAlerts.has("set_" + setId);
                  const inl = inlineAddWord[setId] || { word: "", sentiment: "positive" };
                  return (
                  <div key={setId} style={{ background: "#0F0F18", borderRadius: 6, border: "1px solid #1A1A25", overflow: "hidden" }}>
                    {/* Set header — click to expand/collapse */}
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px" }}>
                      <div className="src-toggle" onClick={() => toggleSignalSet(setId)} style={{ width: 8, height: 8, borderRadius: "50%", background: set.enabled ? "#34C759" : "#555", flexShrink: 0 }} />
                      <span className="src-toggle" onClick={() => toggleExpand("set_" + setId)} style={{ fontSize: 11, fontWeight: 600, color: set.enabled ? "#E8E8ED" : "#555", flex: 1, display: "flex", alignItems: "center", gap: 4 }}>
                        <span style={{ fontSize: 8, transform: isSetExpanded ? "rotate(90deg)" : "rotate(0deg)", display: "inline-block", transition: "transform 0.2s" }}>▶</span>
                        {set.label}
                      </span>
                      <span style={{ fontSize: 9, color: "#555" }}>{Object.keys(set.positive || {}).length}+ / {Object.keys(set.negative || {}).length}−</span>
                    </div>

                    {isSetExpanded && (
                      <div style={{ padding: "0 10px 10px" }}>
                        {/* Inline add word */}
                        <div style={{ display: "flex", gap: 3, marginBottom: 8 }}>
                          <input value={inl.word} onChange={e => setInlineAddWord(prev => ({...prev, [setId]: {...inl, word: e.target.value}}))} onKeyDown={e => e.key === "Enter" && addSignalWord(setId, inl.sentiment, inl.word)} placeholder="add word..." style={{ flex: 1, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 4, padding: "4px 6px", color: "#E8E8ED", fontSize: 10, outline: "none", fontFamily: "inherit" }} />
                          <select value={inl.sentiment} onChange={e => setInlineAddWord(prev => ({...prev, [setId]: {...inl, sentiment: e.target.value}}))} style={{ background: "#14141F", border: "1px solid #2A2A35", borderRadius: 4, padding: "4px 4px", color: "#AAA", fontSize: 9, fontFamily: "inherit", outline: "none" }}>
                            <option value="positive">+Pos</option>
                            <option value="negative">−Neg</option>
                          </select>
                          <button className="btn" onClick={() => addSignalWord(setId, inl.sentiment, inl.word)} style={{ background: "#5448C8", color: "#fff", padding: "4px 8px", borderRadius: 4, fontSize: 10 }}>+</button>
                          <label className="btn" style={{ background: "#2A2A35", color: "#AAA", padding: "4px 8px", borderRadius: 4, fontSize: 9, cursor: "pointer", display: "flex", alignItems: "center" }}>
                            CSV <input type="file" accept=".csv" onChange={e => { importCsv(e.target.files[0], setId); e.target.value = ""; }} style={{ display: "none" }} />
                          </label>
                        </div>

                        {/* Positive words */}
                        <div style={{ fontSize: 9, color: "#34C759", marginBottom: 3 }}>POSITIVE ({Object.keys(set.positive || {}).length})</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginBottom: 8, maxHeight: 140, overflowY: "auto" }}>
                          {Object.entries(set.positive || {}).map(([w, wt]) => (
                            <span key={w} style={{ background: "#34C75915", padding: "2px 4px", borderRadius: 3, fontSize: 9, color: "#34C759", border: "1px solid #34C75922", display: "inline-flex", alignItems: "center", gap: 3 }}>
                              {w}
                              <input type="number" value={wt} step="0.5" min="0.5" max="5" onChange={e => editSignalWeight(setId, "positive", w, e.target.value)} style={{ width: 28, background: "#0A0A0F", border: "1px solid #34C75933", borderRadius: 2, color: "#34C759", fontSize: 8, textAlign: "center", padding: "0 2px", fontFamily: "inherit", outline: "none" }} onClick={e => e.stopPropagation()} />
                              <span className="kw-tag" onClick={() => removeSignalWord(setId, "positive", w)} style={{ color: "#555", fontSize: 8, cursor: "pointer" }}>✕</span>
                            </span>
                          ))}
                          {Object.keys(set.positive || {}).length === 0 && <span style={{ fontSize: 9, color: "#333" }}>no words yet — add some above</span>}
                        </div>

                        {/* Negative words */}
                        <div style={{ fontSize: 9, color: "#FF3B30", marginBottom: 3 }}>NEGATIVE ({Object.keys(set.negative || {}).length})</div>
                        <div style={{ display: "flex", flexWrap: "wrap", gap: 3, maxHeight: 140, overflowY: "auto" }}>
                          {Object.entries(set.negative || {}).map(([w, wt]) => (
                            <span key={w} style={{ background: "#FF3B3015", padding: "2px 4px", borderRadius: 3, fontSize: 9, color: "#FF3B30", border: "1px solid #FF3B3022", display: "inline-flex", alignItems: "center", gap: 3 }}>
                              {w}
                              <input type="number" value={wt} step="0.5" min="0.5" max="5" onChange={e => editSignalWeight(setId, "negative", w, e.target.value)} style={{ width: 28, background: "#0A0A0F", border: "1px solid #FF3B3033", borderRadius: 2, color: "#FF3B30", fontSize: 8, textAlign: "center", padding: "0 2px", fontFamily: "inherit", outline: "none" }} onClick={e => e.stopPropagation()} />
                              <span className="kw-tag" onClick={() => removeSignalWord(setId, "negative", w)} style={{ color: "#555", fontSize: 8, cursor: "pointer" }}>✕</span>
                            </span>
                          ))}
                          {Object.keys(set.negative || {}).length === 0 && <span style={{ fontSize: 9, color: "#333" }}>no words yet — add some above</span>}
                        </div>

                        {/* CSV template link */}
                        <div style={{ marginTop: 6 }}>
                          <a href={API_BASE + "/api/signal-sets/template.csv"} download style={{ fontSize: 8, color: "#5A8FD4", textDecoration: "none" }}>⬇ Download CSV Template</a>
                        </div>
                      </div>
                    )}
                  </div>
                  );
                })}
              </div>
            </>)}

            {configTab === "sources" && (<>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Sources ({enabledSources.length}/{SOURCES.length})</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                {SOURCES.map(s => (
                  <div key={s.id} className="src-toggle" onClick={() => toggleSource(s.id)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px", borderRadius: 6, background: enabledSources.includes(s.id) ? "#14141F" : "transparent", opacity: enabledSources.includes(s.id) ? 1 : 0.35 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: enabledSources.includes(s.id) ? s.color : "#333", flexShrink: 0 }} />
                    <span style={{ fontSize: 12 }}>{s.icon} {s.name}</span>
                    <span style={{ marginLeft: "auto", fontSize: 9, color: "#555", textTransform: "uppercase" }}>{s.type}</span>
                  </div>
                ))}
              </div>
            </>)}
            </div>
          </div>
        </div>

        {/* Main */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>

          {mainView === "alerts" && (<>
          {/* Stats */}
          <div style={{ display: "flex", gap: 1, padding: "12px 20px", borderBottom: "1px solid #1A1A25" }}>
            {[
              { label: "Total Alerts", value: alerts.length, color: "#5448C8" },
              { label: "Bullish", value: alerts.filter(a => a.market_impact === "bullish").length, color: "#34C759" },
              { label: "Bearish", value: alerts.filter(a => a.market_impact === "bearish").length, color: "#FF3B30" },
              { label: "Mixed", value: alerts.filter(a => a.mixed_signals).length, color: "#FF9500" },
              { label: "High Priority", value: alerts.filter(a => a.severity === "high").length, color: "#FF9500" },
              { label: "AI Enriched", value: alerts.filter(a => a.ai_summary).length, color: "#8B80F0" },
            ].map((s, i) => (
              <div key={i} style={{ flex: 1, padding: "8px 14px", background: "#0F0F18", borderRadius: i === 0 ? "8px 0 0 8px" : i === 5 ? "0 8px 8px 0" : 0 }}>
                <div style={{ fontSize: 9, color: "#555", textTransform: "uppercase", letterSpacing: 1.5 }}>{s.label}</div>
                <div style={{ fontSize: 22, fontWeight: 700, color: s.color, fontFamily: "'Space Grotesk',sans-serif" }}>{s.value}</div>
              </div>
            ))}
          </div>

          {/* Filters */}
          <div style={{ display: "flex", gap: 8, padding: "10px 20px", borderBottom: "1px solid #1A1A25", flexWrap: "wrap", alignItems: "center" }}>
            <select value={filter} onChange={e => setFilter(e.target.value)} style={{ background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "5px 8px", color: "#AAA", fontSize: 11, fontFamily: "inherit", outline: "none" }}>
              <option value="all">All Keywords</option>
              {keywords.map(k => <option key={k} value={k}>{k}</option>)}
            </select>
            <select value={severityFilter} onChange={e => setSeverityFilter(e.target.value)} style={{ background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "5px 8px", color: "#AAA", fontSize: 11, fontFamily: "inherit", outline: "none" }}>
              <option value="all">All Severity</option>
              <option value="high">🔴 High</option>
              <option value="medium">🟠 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
            <select value={sentimentFilter} onChange={e => setSentimentFilter(e.target.value)} style={{ background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "5px 8px", color: "#AAA", fontSize: 11, fontFamily: "inherit", outline: "none" }}>
              <option value="all">All Tone</option>
              <option value="positive">📈 Positive</option>
              <option value="neutral">➡️ Neutral</option>
              <option value="negative">📉 Negative</option>
            </select>
            <select value={impactFilter} onChange={e => setImpactFilter(e.target.value)} style={{ background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "5px 8px", color: "#AAA", fontSize: 11, fontFamily: "inherit", outline: "none" }}>
              <option value="all">All Impact</option>
              <option value="bullish">📈 Bullish</option>
              <option value="neutral">➡️ Neutral</option>
              <option value="bearish">📉 Bearish</option>
            </select>
            <button className="btn" onClick={() => { fetch(API_BASE + "/api/alerts", { method: "DELETE" }).catch(() => {}); setAlerts([]); }} style={{ marginLeft: "auto", background: "transparent", color: "#555", padding: "5px 10px", fontSize: 11, border: "none" }}>Clear All</button>
          </div>

          {/* Alert Feed */}
          <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: 60, color: "#333" }}>
                <div style={{ fontSize: 32, marginBottom: 8 }}>◎</div>
                <div style={{ fontSize: 13 }}>{backendConnected ? "No alerts matching filters — waiting for next poll cycle" : "Waiting for backend connection..."}</div>
              </div>
            )}
            {filtered.map(a => {
              const src = srcMap[a.source] || { icon: "?", name: a.source_name || a.source, color: "#888" };
              const sent = a.sentiment || "neutral";
              const sentColor = sentColors[sent] || "#8E8E93";
              const sentIcon = sentIcons[sent] || "➡️";
              const scoreStr = a.sentiment_score != null ? (a.sentiment_score > 0 ? "+" : "") + a.sentiment_score.toFixed(1) : "";
              const isExpanded = expandedAlerts.has(a.id);
              return (
                <div key={a.id} className="alert-row" style={{ display: "flex", gap: 12, padding: "12px 20px", borderBottom: "1px solid #111118", borderLeft: "3px solid " + sentColor + "44" }}>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, width: 44, flexShrink: 0, paddingTop: 2 }}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: sevColors[a.severity] || "#888" }} />
                    <span style={{ fontSize: 18 }}>{src.icon}</span>
                    <span style={{ fontSize: 14 }}>{sentIcon}</span>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 6, marginBottom: 4 }}>
                      <div style={{ fontSize: 13, fontWeight: 500, color: a.is_duplicate ? "#555" : "#E8E8ED", lineHeight: 1.3, flex: 1, textDecoration: a.is_duplicate ? "line-through" : "none" }}>{a.title}</div>
                      {a.report_count > 1 && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#5448C815", color: "#8B80F0", flexShrink: 0, whiteSpace: "nowrap" }}>×{a.report_count} sources</span>}
                    </div>

                    {/* Also reported by */}
                    {a.also_reported_by && a.also_reported_by.length > 0 && (
                      <div style={{ fontSize: 9, color: "#555", marginBottom: 4 }}>Also: {a.also_reported_by.join(", ")}</div>
                    )}

                    {/* Affected tickers */}
                    {a.affected_tickers && a.affected_tickers.length > 0 && (
                      <div style={{ display: "flex", gap: 3, marginBottom: 4, flexWrap: "wrap" }}>
                        {a.affected_tickers.map(t => (
                          <span key={t} className="btn" onClick={() => { setMainView("market"); setSelectedStock(t); }} style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#1A2A1A", color: "#34C759", border: "1px solid #34C75922" }}>${t}</span>

                      </div>
                    )}

                    {/* Event extraction — show when available */}
                    {a.event && a.event.action && (
                      <div style={{ fontSize: 9, color: "#666", marginBottom: 4, display: "flex", gap: 6, flexWrap: "wrap" }}>
                        <span style={{ color: "#AAA" }}>{a.event.actor}</span>
                        <span style={{ color: "#8B80F0" }}>{a.event.action.replace(/_/g, " ")}</span>
                        {a.event.target && <span style={{ color: "#AAA" }}>→ {a.event.target}</span>}
                        {a.event.magnitude && <span style={{ color: "#FF9500" }}>({a.event.magnitude})</span>}
                        {a.event.is_confirmed === false && <span style={{ color: "#FF3B30" }}>unconfirmed</span>}
                      </div>
                    )}

                    {/* Expandable Summary */}
                    {a.summary && (
                      <div style={{ marginBottom: 4 }}>
                        <button className="btn" onClick={() => toggleExpand(a.id)} style={{ fontSize: 9, color: "#666", background: "none", padding: "2px 0", marginBottom: 3, display: "flex", alignItems: "center", gap: 4 }}>
                          <span style={{ fontSize: 8, transition: "transform 0.2s", transform: isExpanded ? "rotate(90deg)" : "rotate(0deg)", display: "inline-block" }}>▶</span>
                          {isExpanded ? "Hide Summary" : "Show Summary"}
                          {a.ai_summary && <span style={{ fontSize: 8, background: "#5448C820", color: "#8B80F0", padding: "1px 4px", borderRadius: 3 }}>🤖 AI</span>}
                          {a.ai_processing && !a.ai_summary && <span className="thinking" style={{ fontSize: 8, color: "#FF9500", marginLeft: 2 }}>🤖 Analyzing</span>}
                          {!a.ai_summary && !a.ai_processing && a.article_fetched && <span style={{ fontSize: 8, color: "#444" }}>◉ text only</span>}
                        </button>
                        {isExpanded && (
                          <div style={{ marginTop: 2 }}>
                            <div style={{ fontSize: 11, color: "#BBB", lineHeight: 1.6, padding: "8px 10px", background: "#0F0F18", borderRadius: 6, borderLeft: "2px solid " + sentColor + "66" }}>
                              {a.summary}
                            </div>

                            {/* Chat conversation thread */}
                            <div style={{ marginTop: 8 }}>
                              {/* Chat history */}
                              {(chatHistories[a.id] || []).map((msg, i) => (
                                <div key={i} className="chat-msg" style={{ display: "flex", justifyContent: msg.role === "user" ? "flex-end" : "flex-start", marginBottom: 6 }}>
                                  <div style={{
                                    maxWidth: "85%",
                                    padding: "6px 10px",
                                    borderRadius: msg.role === "user" ? "8px 8px 2px 8px" : "8px 8px 8px 2px",
                                    background: msg.role === "user" ? "#5448C8" : "#0A0A14",
                                    color: msg.role === "user" ? "#fff" : "#AAA",
                                    fontSize: 10,
                                    lineHeight: 1.5,
                                    border: msg.role === "user" ? "none" : "1px solid #1A1A25",
                                  }}>
                                    {msg.role === "ai" && <span style={{ fontSize: 8, color: "#8B80F0", marginRight: 4 }}>🤖</span>}
                                    {msg.text}
                                  </div>
                                </div>
                              ))}

                              {/* Thinking indicator */}
                              {chatLoading === a.id && (
                                <div className="chat-msg" style={{ display: "flex", justifyContent: "flex-start", marginBottom: 6 }}>
                                  <div style={{ padding: "6px 10px", borderRadius: "8px 8px 8px 2px", background: "#0A0A14", border: "1px solid #1A1A25", fontSize: 10, color: "#8B80F0" }}>
                                    <span style={{ fontSize: 8, marginRight: 4 }}>🤖</span>
                                    <span className="thinking">Thinking</span>
                                  </div>
                                </div>
                              )}

                              {/* Input */}
                              <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
                                <input
                                  value={chatInputs[a.id] || ""}
                                  onChange={e => setChatInputs(prev => ({...prev, [a.id]: e.target.value}))}
                                  onKeyDown={e => e.key === "Enter" && askFollowUp(a.id)}
                                  placeholder={chatHistories[a.id]?.length ? "Ask another question..." : "Ask about this article..."}
                                  disabled={chatLoading === a.id}
                                  style={{ flex: 1, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "5px 8px", color: "#E8E8ED", fontSize: 10, outline: "none", fontFamily: "inherit", opacity: chatLoading === a.id ? 0.5 : 1 }}
                                />
                                <button className="btn" onClick={() => askFollowUp(a.id)} disabled={chatLoading === a.id} style={{ background: "#5448C8", color: "#fff", padding: "5px 10px", borderRadius: 6, fontSize: 10, opacity: chatLoading === a.id ? 0.5 : 1 }}>
                                  {chatLoading === a.id ? "..." : "Ask"}
                                </button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    <div style={{ display: "flex", gap: 5, alignItems: "center", flexWrap: "wrap" }}>
                      {/* Market impact — primary badge */}
                      {(() => {
                        const impact = a.market_impact || "neutral";
                        const impactColors = { bullish: "#34C759", bearish: "#FF3B30", neutral: "#8E8E93" };
                        const impactColor = impactColors[impact] || "#8E8E93";
                        return <span style={{ fontSize: 10, padding: "2px 8px", borderRadius: 3, color: impactColor, background: impactColor + "15", border: "1px solid " + impactColor + "33", fontWeight: 600 }}>{impact === "bullish" ? "📈 BULLISH" : impact === "bearish" ? "📉 BEARISH" : "➡️ NEUTRAL"}</span>;
                      })()}

                      {/* Article tone — secondary */}
                      <span style={{ fontSize: 9, padding: "1px 6px", borderRadius: 3, color: sentColor, background: sentColor + "10", border: "1px solid " + sentColor + "22" }}>tone: {sent}</span>

                      {/* Mixed signals flag */}
                      {a.mixed_signals && <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#FF950015", color: "#FF9500", border: "1px solid #FF950022" }}>⚡ mixed</span>}

                      {/* Ensemble method */}
                      {a.classification_method && a.classification_method !== "lexicon_only" && (
                        <span style={{ fontSize: 8, color: "#555" }}>{a.classification_method}</span>
                      )}

                      {/* AI vs word disagreement */}
                      {a.ai_sentiment && a.word_sentiment && a.ai_sentiment !== a.word_sentiment && a.word_sentiment !== "neutral" && (
                        <span style={{ fontSize: 8, padding: "1px 5px", borderRadius: 3, background: "#FF950010", color: "#FF9500" }}>⚡ AI:{a.ai_sentiment}/Words:{a.word_sentiment}</span>
                      )}

                      {/* Confidence */}
                      {a.confidence != null && <span style={{ fontSize: 9, color: "#555" }}>{Math.round(a.confidence * 100)}%</span>}

                      {/* Event type / scope / horizon chips */}
                      {a.event_type && a.event_type !== "other" && <span style={{ fontSize: 8, color: "#444", background: "#14141F", padding: "1px 5px", borderRadius: 2 }}>{a.event_type}</span>}
                      {a.scope && a.scope !== "broad_market" && <span style={{ fontSize: 8, color: "#444", background: "#14141F", padding: "1px 5px", borderRadius: 2 }}>{a.scope}</span>}
                      {a.time_horizon && a.time_horizon !== "unclear" && <span style={{ fontSize: 8, color: "#444", background: "#14141F", padding: "1px 5px", borderRadius: 2 }}>{a.time_horizon}</span>}

                      {/* Signal words */}
                      {a.positive_signals && a.positive_signals.length > 0 && <span style={{ fontSize: 8, color: "#34C759" }}>+{a.positive_signals.slice(0,4).join(", +")}</span>}
                      {a.negative_signals && a.negative_signals.length > 0 && <span style={{ fontSize: 8, color: "#FF3B30" }}>−{a.negative_signals.slice(0,4).join(", −")}</span>}

                      <span style={{ fontSize: 10, background: "#1A1A25", padding: "2px 8px", borderRadius: 3, color: src.color, border: "1px solid " + src.color + "33" }}>{a.source_name || src.name}</span>
                      <span style={{ fontSize: 10, background: "#5448C820", padding: "2px 8px", borderRadius: 3, color: "#8B80F0", border: "1px solid #5448C833" }}>{a.keyword}</span>
                      {a.url && <a href={a.url} target="_blank" rel="noopener noreferrer" className="src-link">↗ View Source</a>}

                      {/* Correction buttons */}
                      {!a.user_corrected && (
                        <span style={{ display: "inline-flex", gap: 2, marginLeft: 4 }}>
                          <button className="btn" onClick={e => { e.stopPropagation(); correctSentiment(a.url, "positive"); }} title="Mark as positive" style={{ fontSize: 10, padding: "1px 4px", background: "none", color: "#34C759", opacity: 0.5 }}>👍</button>
                          <button className="btn" onClick={e => { e.stopPropagation(); correctSentiment(a.url, "neutral"); }} title="Mark as neutral" style={{ fontSize: 10, padding: "1px 4px", background: "none", color: "#8E8E93", opacity: 0.5 }}>➡️</button>
                          <button className="btn" onClick={e => { e.stopPropagation(); correctSentiment(a.url, "negative"); }} title="Mark as negative" style={{ fontSize: 10, padding: "1px 4px", background: "none", color: "#FF3B30", opacity: 0.5 }}>👎</button>
                          <button className="btn" onClick={e => { e.stopPropagation(); correctSentiment(a.url, "duplicate"); }} title="Mark as duplicate" style={{ fontSize: 10, padding: "1px 4px", background: "none", color: "#FF9500", opacity: 0.5 }}>🔄</button>
                        </span>
                      )}
                      {a.user_corrected && !a.is_duplicate && <span style={{ fontSize: 8, color: "#34C759" }}>✓ corrected</span>}
                      {a.is_duplicate && <span style={{ fontSize: 8, color: "#FF9500" }}>🔄 duplicate</span>}
                      <span style={{ fontSize: 10, color: "#444", marginLeft: "auto" }}>{timeAgo(a.timestamp)}</span>
                      {a.published_at ? <span style={{ fontSize: 9, color: "#555" }}>📅 {a.published_at}</span> : <span style={{ fontSize: 9, color: "#333" }}>⏱ no pub date</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          </>)}

          {/* ═══ MARKET DASHBOARD ═══ */}
          {mainView === "market" && (
          <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 10, marginBottom: 24 }}>
              {Object.entries(indices).map(([sym, q]) => {
                const isUp = q.change >= 0;
                return (
                  <div key={sym} style={{ background: "#0F0F18", borderRadius: 8, padding: 14, border: "1px solid #1A1A25" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 11, fontWeight: 600, color: "#E8E8ED" }}>{q.name || sym}</span>
                      <span style={{ fontSize: 9, color: "#555" }}>{q.market_state}</span>
                    </div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: "#E8E8ED", fontFamily: "'Space Grotesk',sans-serif" }}>${q.price?.toLocaleString()}</div>
                    <div style={{ fontSize: 12, color: isUp ? "#34C759" : "#FF3B30", fontWeight: 600, marginBottom: 8 }}>
                      {isUp ? "▲" : "▼"} {q.change > 0 ? "+" : ""}{q.change} ({q.change_pct > 0 ? "+" : ""}{q.change_pct}%)
                    </div>
                    <Sparkline data={q.chart} width={180} height={40} color={isUp ? "#34C759" : "#FF3B30"} />
                  </div>
                );
              })}
              {Object.keys(indices).length === 0 && <div style={{ color: "#333", fontSize: 12, padding: 20 }}>Loading market data...</div>}
            </div>

            {/* Range selector */}
            <div style={{ display: "flex", gap: 6, marginBottom: 16 }}>
              {[["1d","1D"],["5d","5D"],["1mo","1M"],["3mo","3M"],["6mo","6M"],["1y","1Y"]].map(([val, label]) => (
                <button key={val} className="btn" onClick={() => setSelectedRange(val)} style={{ background: selectedRange === val ? "#5448C8" : "#14141F", color: selectedRange === val ? "#fff" : "#AAA", padding: "4px 12px", borderRadius: 4, fontSize: 10 }}>{label}</button>
              ))}
            </div>

            {/* Watchlist */}
            <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 12, textTransform: "uppercase" }}>Watchlist</div>
            <div style={{ display: "flex", gap: 6, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>
              <div style={{ display: "flex", borderRadius: 6, overflow: "hidden", border: "1px solid #2A2A35" }}>
                <button className="btn" onClick={() => setAssetType("stock")} style={{ padding: "6px 12px", fontSize: 11, background: assetType === "stock" ? "#5448C8" : "#14141F", color: assetType === "stock" ? "#fff" : "#AAA", borderRadius: 0 }}>Stock</button>
                <button className="btn" onClick={() => setAssetType("crypto")} style={{ padding: "6px 12px", fontSize: 11, background: assetType === "crypto" ? "#F7931A" : "#14141F", color: assetType === "crypto" ? "#fff" : "#AAA", borderRadius: 0 }}>Crypto</button>
              </div>
              <input value={newSymbol} onChange={e => { setNewSymbol(e.target.value.toUpperCase()); setAddError(""); }} onKeyDown={e => e.key === "Enter" && addToWatchlist()} placeholder={assetType === "crypto" ? "BTC, ETH, SOL..." : "AAPL, TSLA, MSFT..."} style={{ flex: 1, maxWidth: 220, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "6px 10px", color: "#E8E8ED", fontSize: 12, outline: "none", fontFamily: "inherit" }} />
              <button className="btn" onClick={addToWatchlist} disabled={addingSymbol} style={{ background: "#5448C8", color: "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 12, opacity: addingSymbol ? 0.5 : 1 }}>{addingSymbol ? "..." : "+"}</button>
            </div>
            {addError && <div style={{ fontSize: 10, color: "#FF3B30", marginBottom: 10 }}>⚠ {addError}</div>}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10, marginBottom: 24 }}>
              {watchlist.map(item => {
                const sym = item.symbol;
                const q = watchlistQuotes[sym];
                if (!q) return (
                  <div key={sym} style={{ background: "#0F0F18", borderRadius: 8, padding: 14, border: "1px solid #1A1A25", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ color: "#555", fontSize: 11 }}>{item.type === "crypto" ? "₿" : "📊"} {sym} — loading...</span>
                    <span className="kw-tag" onClick={() => removeFromWatchlist(sym)} style={{ fontSize: 10, color: "#FF3B30", padding: "2px 6px", cursor: "pointer" }}>✕</span>
                  </div>
                );
                const isUp = q.change >= 0;
                const isSelected = selectedStock === sym;
                return (
                  <div key={sym} className="src-toggle" onClick={() => selectStock(sym)} style={{ background: isSelected ? "#14141F" : "#0F0F18", borderRadius: 8, padding: 14, border: isSelected ? "1px solid #5448C8" : "1px solid #1A1A25", cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <div>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#E8E8ED" }}>{q.type === "crypto" ? "₿ " : ""}{sym}</span>
                        <span style={{ fontSize: 10, color: "#555", marginLeft: 6 }}>{q.name}</span>
                      </div>
                      <span className="kw-tag" onClick={e => { e.stopPropagation(); removeFromWatchlist(sym); }} style={{ fontSize: 10, color: "#555", padding: "2px 4px" }}>✕</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                      <span style={{ fontSize: 20, fontWeight: 700, color: "#E8E8ED", fontFamily: "'Space Grotesk',sans-serif" }}>${q.price?.toLocaleString()}</span>
                      <span style={{ fontSize: 12, color: isUp ? "#34C759" : "#FF3B30", fontWeight: 600 }}>
                        {isUp ? "▲" : "▼"} {q.change > 0 ? "+" : ""}{q.change} ({q.change_pct > 0 ? "+" : ""}{q.change_pct}%)
                      </span>
                    </div>
                    <Sparkline data={q.chart} width={250} height={50} color={isUp ? "#34C759" : "#FF3B30"} />
                    {isSelected && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 10 }}>
                          {[
                            ["Day High", "$" + q.day_high], ["Day Low", "$" + q.day_low],
                            ["Volume", (q.volume || 0).toLocaleString()], ["Prev Close", "$" + q.prev_close],
                            ["52w High", "$" + q.fifty_two_wk_high], ["52w Low", "$" + q.fifty_two_wk_low],
                            ["Exchange", q.exchange],
                            ["Mkt Cap", q.market_cap ? (q.market_cap > 1e12 ? (q.market_cap/1e12).toFixed(1)+"T" : q.market_cap > 1e9 ? (q.market_cap/1e9).toFixed(1)+"B" : (q.market_cap/1e6).toFixed(0)+"M") : "N/A"],
                          ].map(([l,v]) => (
                            <div key={l} style={{ fontSize: 10 }}><span style={{ color: "#555" }}>{l}: </span><span style={{ color: "#AAA" }}>{v}</span></div>
                          ))}
                        </div>
                        {/* News for this stock */}
                        {stockNews.length > 0 && (
                          <div style={{ borderTop: "1px solid #1A1A25", paddingTop: 8 }}>
                            <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Related News (24h)</div>
                            {stockNews.slice(0, 5).map((n, i) => (
                              <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{ display: "block", fontSize: 10, color: "#AAA", textDecoration: "none", padding: "4px 0", borderBottom: "1px solid #0A0A0F", lineHeight: 1.4 }}>
                                {n.title}
                                <span style={{ fontSize: 8, color: "#555", marginLeft: 6 }}>{n.source} · {n.published_at}</span>
                              </a>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Market News Feed */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, textTransform: "uppercase" }}>Market News</div>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {Object.entries(marketNewsSources).map(([id, src]) => (
                  <button key={id} className="btn" onClick={() => toggleMarketNewsSource(id)} style={{ fontSize: 8, padding: "2px 6px", borderRadius: 3, background: src.enabled ? "#1A2A1A" : "#14141F", color: src.enabled ? "#34C759" : "#555", border: "1px solid " + (src.enabled ? "#34C75933" : "#2A2A35") }}>{src.name}</button>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {marketNews.slice(0, 15).map((n, i) => (
                <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, padding: "8px 10px", background: "#0F0F18", borderRadius: 6, border: "1px solid #1A1A25", textDecoration: "none" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, color: "#E8E8ED", lineHeight: 1.3 }}>{n.title}</div>
                    {n.summary && <div style={{ fontSize: 10, color: "#555", marginTop: 3 }}>{n.summary}</div>}
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 9, color: "#5448C8" }}>{n.source}</div>
                    <div style={{ fontSize: 8, color: "#555" }}>{n.published_at}</div>
                  </div>
                </a>
              ))}
              {marketNews.length === 0 && <div style={{ color: "#333", fontSize: 11, padding: 20, textAlign: "center" }}>Loading market news...</div>}
            </div>
          </div>
          )}

          {/* ═══ ECONOMY DASHBOARD ═══ */}
          {mainView === "economy" && (
          <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 16, textTransform: "uppercase" }}>Economic Indicators & Market Context</div>

            {/* Top row: Fear & Greed + BTC Binance */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 20 }}>
              <div style={{ background: "#0F0F18", borderRadius: 8, padding: 16, border: "1px solid #1A1A25", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>Crypto Fear & Greed Index</div>
                {fgData && fgData[0] ? (() => {
                  const fgValue = fgData[0].value;
                  const fgLabel = fgData[0].label;
                  const fgColor = fgValue >= 70 ? "#34C759" : fgValue >= 45 ? "#FF9500" : "#FF3B30";
                  return (<>
                    <div style={{ fontSize: 36, fontWeight: 700, color: fgColor, fontFamily: "'Space Grotesk',sans-serif" }}>{fgValue}</div>
                    <div style={{ fontSize: 12, color: fgColor, fontWeight: 600 }}>{fgLabel}</div>
                    {fgData.length > 1 && <div style={{ fontSize: 9, color: "#555", marginTop: 4 }}>Yesterday: {fgData[1]?.value} ({fgData[1]?.label})</div>}
                  </>);
                })() : <div style={{ color: "#555", fontSize: 11 }}>Loading...</div>}
              </div>
              <div style={{ background: "#0F0F18", borderRadius: 8, padding: 16, border: "1px solid #1A1A25", textAlign: "center" }}>
                <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, textTransform: "uppercase", marginBottom: 8 }}>BTC/USDT (Binance)</div>
                {binanceTicker ? (<>
                  <div style={{ fontSize: 28, fontWeight: 700, color: "#E8E8ED", fontFamily: "'Space Grotesk',sans-serif" }}>${binanceTicker.price?.toLocaleString()}</div>
                  <div style={{ fontSize: 12, color: binanceTicker.change_pct_24h >= 0 ? "#34C759" : "#FF3B30", fontWeight: 600 }}>
                    {binanceTicker.change_pct_24h >= 0 ? "▲" : "▼"} {binanceTicker.change_pct_24h}%
                  </div>
                  <div style={{ fontSize: 9, color: "#555", marginTop: 4 }}>Vol: ${Math.round(binanceTicker.quote_volume_24h / 1e9)}B · {binanceTicker.trades_24h?.toLocaleString()} trades</div>
                </>) : <div style={{ color: "#555", fontSize: 11 }}>Loading...</div>}
              </div>
            </div>

            {/* FRED Economic Indicators */}
            {fredData ? (
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>FRED Economic Data</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))", gap: 10 }}>
                  {Object.entries(fredData).map(([id, d]) => (
                    <div key={id} style={{ background: "#0F0F18", borderRadius: 8, padding: 12, border: "1px solid #1A1A25" }}>
                      <div style={{ fontSize: 9, color: "#555", marginBottom: 4 }}>{d.label}</div>
                      <div style={{ fontSize: 20, fontWeight: 700, color: "#E8E8ED", fontFamily: "'Space Grotesk',sans-serif" }}>
                        {d.value != null ? d.value.toLocaleString() : "N/A"}

                      </div>}
