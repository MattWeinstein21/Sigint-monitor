            <div style={{display:"flex",gap:8}}>
              <button className="b" onClick={function(){F("/api/data/accuracy").then(function(d){sAcd(d);tt("Refreshed")}).catch(function(){})}} style={{background:"#14141F",color:"#AAA",padding:"6px 12px",borderRadius:6,fontSize:11}}>⟳</button>
              <button className="b" onClick={function(){fetch(API+"/api/data/apply-recalibration",{method:"POST"}).then(function(r){return r.json()}).then(function(d){if(d.adjustments&&d.adjustments.length>0){tt("Applied "+d.adjustments.length);if(d.sets)sSs(d.sets)}else tt("No adjustments needed")}).catch(function(){})}} style={{background:"#5448C8",color:"#fff",padding:"6px 12px",borderRadius:6,fontSize:11}}>🔧 Recalibrate</button>
            </div>
          </div>
          {!acd&&<div style={{color:"#555",padding:40,textAlign:"center"}}>Loading... Correct some alerts first.</div>}
          {acd&&<div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:24}}>
              {[{l:"Disagreements",v:((acd.disagreement_outcomes||{}).total_disagreements_corrected)||0,c:"#FF9500"},{l:"AI Right",v:((acd.disagreement_outcomes||{}).ai_was_right)||0,c:"#34C759"},{l:"Words Right",v:((acd.disagreement_outcomes||{}).words_were_right)||0,c:"#5448C8"},{l:"Corrections",v:((acd.correction_stats_global||{}).sample_size)||0,c:"#8E8E93"}].map(function(x,i){return <div key={i} style={{background:"#0F0F18",borderRadius:8,padding:14,border:"1px solid #1A1A25"}}><div style={{fontSize:9,color:"#555",textTransform:"uppercase"}}>{x.l}</div><div style={{fontSize:24,fontWeight:700,color:x.c,fontFamily:"'Space Grotesk',sans-serif"}}>{x.v}</div></div>})}
            </div>
            {acd.confidence_calibration&&acd.confidence_calibration.length>0&&<div style={{marginBottom:24}}>
              <div style={{fontSize:10,fontWeight:600,color:"#666",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Confidence Calibration</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8}}>
                {acd.confidence_calibration.map(function(b,i){return <div key={i} style={{background:"#0F0F18",borderRadius:6,padding:10,border:"1px solid #1A1A25"}}><div style={{fontSize:10,fontWeight:600,color:"#E8E8ED"}}>{b.range}</div><div style={{fontSize:9,color:"#555"}}>n={b.total_articles} corr={b.corrections}</div><div style={{fontSize:11,color:b.overconfident?"#FF3B30":"#34C759",fontWeight:600}}>Actual: {Math.round(b.actual_accuracy*100)}%</div></div>})}
              </div>
            </div>}
            {acd.signal_word_misfires&&<div style={{marginBottom:24}}>
              <div style={{fontSize:10,fontWeight:600,color:"#666",letterSpacing:2,marginBottom:10,textTransform:"uppercase"}}>Misfires</div>
              {(acd.signal_word_misfires.adjustments||[]).length>0?(acd.signal_word_misfires.adjustments||[]).map(function(adj,i){return <div key={i} style={{background:"#0F0F18",borderRadius:6,padding:10,border:"1px solid #1A1A25",marginBottom:6,display:"flex",justifyContent:"space-between"}}><span style={{color:adj.current_type==="positive"?"#34C759":"#FF3B30"}}>"{adj.word}" x{adj.misfire_count}</span><span style={{fontSize:9,color:"#FF9500"}}>⚠</span></div>}):<div style={{fontSize:11,color:"#555"}}>None yet</div>}
            </div>}
            <div style={{background:"#0F0F18",borderRadius:8,padding:16,border:"1px solid #1A1A25",fontSize:11,color:"#555",lineHeight:1.6}}>Click "✎ Correct" on any alert to fix wrong classifications. Choose bullish/neutral/bearish and optionally explain why. After 10+ corrections, patterns appear here. Click Recalibrate to auto-fix misfiring word weights.</div>
          </div>}
        </div>}

      </div>
    </div>

      {/* ═══ FLOATING AI CHAT ═══ */}
      {/* Chat toggle button */}
      <div style={{position:"fixed",bottom:24,right:24,zIndex:50}}>
        {!chatOpen&&<button className="b" onClick={function(){sChatOpen(true)}} style={{width:56,height:56,borderRadius:"50%",background:"#5448C8",color:"#fff",fontSize:24,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(84,72,200,0.4)"}}>🤖</button>}
      </div>

      {/* Chat panel */}
      {/* ═══ VERSION BADGE ═══ */}
      <div style={{position:"fixed",bottom:10,left:14,zIndex:49,pointerEvents:"none"}}>
        <span style={{fontSize:9,color:"#2A2A3A",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.04em",userSelect:"none"}}>SIGINT v1.4.0 · 2026-04-15</span>
      </div>

      {chatOpen&&<div style={{position:"fixed",bottom:24,right:24,width:420,maxWidth:"calc(100vw - 48px)",height:520,maxHeight:"calc(100vh - 100px)",background:"#0F0F18",borderRadius:16,border:"1px solid #2A2A35",display:"flex",flexDirection:"column",zIndex:50,boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
        {/* Header */}
        <div style={{padding:"14px 16px",borderBottom:"1px solid #1A1A25",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#E8E8ED"}}>🤖 SIGINT AI</div>
            <div style={{fontSize:9,color:"#555"}}>Ask about markets, news, trends — powered by your articles</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button className="b" onClick={function(){sGcMsgs([]);tt("Chat cleared")}} style={{fontSize:9,color:"#555",background:"none",padding:"4px 6px"}}>Clear</button>
            <button className="b" onClick={function(){sChatOpen(false)}} style={{fontSize:16,color:"#555",background:"none",padding:"2px 6px"}}>✕</button>
          </div>
        </div>

        {/* Messages */}
        <div style={{flex:1,overflowY:"auto",padding:"12px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {gcMsgs.length===0&&<div style={{textAlign:"center",padding:"40px 20px",color:"#333"}}>
            <div style={{fontSize:28,marginBottom:12}}>🤖</div>
            <div style={{fontSize:12,color:"#555",marginBottom:16}}>Ask me about current events, market trends, or any news I have been monitoring.</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {["What are the key headlines today?","What is the market sentiment right now?","Summarize the latest news on tariffs","Any bearish signals I should watch?"].map(function(q,i){
                return <button key={i} className="b" onClick={function(){sGcInput(q)}} style={{padding:"8px 12px",background:"#14141F",color:"#AAA",borderRadius:6,fontSize:10,textAlign:"left",border:"1px solid #1A1A25"}}>{q}</button>;
              })}
            </div>
          </div>}

          {gcMsgs.map(function(m,i){
            return <div key={i} className="cm" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"85%",padding:"8px 12px",borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:m.role==="user"?"#5448C8":"#14141F",color:m.role==="user"?"#fff":"#CCC",fontSize:11,lineHeight:1.6,border:m.role==="user"?"none":"1px solid #1A1A25",whiteSpace:"pre-wrap"}}>
                {m.role==="ai"&&<div style={{fontSize:8,color:"#8B80F0",marginBottom:4,fontWeight:600}}>SIGINT AI{m.meta||""}</div>}
                {m.text}
              </div>
            </div>;
          })}

          {gcLoading&&<div className="cm" style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:"12px 12px 12px 2px",background:"#14141F",border:"1px solid #1A1A25",fontSize:11,color:"#8B80F0"}}><span className="thk">Thinking</span></div></div>}
        </div>

        {/* Input */}
        <div style={{padding:"12px 16px",borderTop:"1px solid #1A1A25",flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={gcInput} onChange={function(e){sGcInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey)sendGcMsg()}} placeholder="Ask about news, markets, trends..." disabled={gcLoading} style={{flex:1,background:"#0A0A0F",border:"1px solid #2A2A35",borderRadius:8,padding:"10px 12px",color:"#E8E8ED",fontSize:11,outline:"none",opacity:gcLoading?0.5:1}}/>
            <button className="b" onClick={sendGcMsg} disabled={gcLoading} style={{background:"#5448C8",color:"#fff",padding:"10px 16px",borderRadius:8,fontSize:12,opacity:gcLoading?0.5:1}}>Send</button>
          </div>
        </div>
      </div>}

  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
