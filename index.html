                    </div>
                  ))}
                </div>
              </div>
            ) : <div style={{ color: "#555", fontSize: 11, marginBottom: 12 }}>Add fred_api_key to config.json for economic indicators (free at fred.stlouisfed.org)</div>}

            {/* Hacker News */}
            <div>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Hacker News — Top Stories</div>
              {hnStories.length > 0 ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {hnStories.map((s, i) => (
                    <a key={i} href={s.url} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 10px", background: "#0F0F18", borderRadius: 6, border: "1px solid #1A1A25", textDecoration: "none" }}>
                      <span style={{ fontSize: 11, color: "#FF9500", fontWeight: 600, minWidth: 30, textAlign: "right" }}>▲{s.score}</span>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 12, color: "#E8E8ED", lineHeight: 1.3 }}>{s.title}</div>
                        <div style={{ fontSize: 9, color: "#555" }}>{s.comments} comments · {s.by}</div>
                      </div>
                    </a>
                  ))}
                </div>
              ) : <div style={{ color: "#555", fontSize: 11 }}>Loading...</div>}
            </div>
          </div>
          )}

          {/* ═══ ACCURACY / ANALYTICS DASHBOARD ═══ */}
          {mainView === "analytics" && (
          <div style={{ flex: 1, overflowY: "auto", padding: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, textTransform: "uppercase" }}>Classification Accuracy Dashboard</div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn" onClick={() => { fetch(API_BASE + "/api/data/accuracy").then(r => r.json()).then(d => { setAccuracyData(d); showToast("✓ Dashboard refreshed"); }).catch(() => {}); }} style={{ background: "#14141F", color: "#AAA", padding: "6px 12px", borderRadius: 6, fontSize: 11 }}>⟳ Refresh</button>
                <button className="btn" onClick={applyRecalibration} style={{ background: "#5448C8", color: "#fff", padding: "6px 12px", borderRadius: 6, fontSize: 11 }}>🔧 Auto-Recalibrate Weights</button>
              </div>
            </div>

            {!accuracyData && <div style={{ color: "#555", padding: 40, textAlign: "center" }}>Loading accuracy data... Make some sentiment corrections first to see results.</div>}

            {accuracyData && (<>
              {/* Global stats */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 10, marginBottom: 24 }}>
                {[
                  { label: "AI vs Words Disagreements", value: accuracyData.disagreement_outcomes?.total_disagreements_corrected || 0, color: "#FF9500" },
                  { label: "AI Was Right", value: accuracyData.disagreement_outcomes?.ai_was_right || 0, color: "#34C759" },
                  { label: "Words Were Right", value: accuracyData.disagreement_outcomes?.words_were_right || 0, color: "#5448C8" },
                  { label: "Total Corrections", value: accuracyData.correction_stats_global?.sample_size || 0, color: "#8E8E93" },
                ].map((s, i) => (
                  <div key={i} style={{ background: "#0F0F18", borderRadius: 8, padding: 14, border: "1px solid #1A1A25" }}>
                    <div style={{ fontSize: 9, color: "#555", textTransform: "uppercase", letterSpacing: 1 }}>{s.label}</div>
                    <div style={{ fontSize: 24, fontWeight: 700, color: s.color, fontFamily: "'Space Grotesk',sans-serif" }}>{s.value}</div>
                  </div>
                ))}
              </div>

              {/* Confidence Calibration */}
              {accuracyData.confidence_calibration && accuracyData.confidence_calibration.length > 0 && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Confidence Calibration</div>
                  <div style={{ fontSize: 9, color: "#555", marginBottom: 8 }}>When the system says X% confidence, is it actually correct X% of the time?</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(140px, 1fr))", gap: 8 }}>
                    {accuracyData.confidence_calibration.map((b, i) => (
                      <div key={i} style={{ background: "#0F0F18", borderRadius: 6, padding: 10, border: "1px solid #1A1A25" }}>
                        <div style={{ fontSize: 10, fontWeight: 600, color: "#E8E8ED", marginBottom: 4 }}>{b.range}</div>
                        <div style={{ fontSize: 9, color: "#555" }}>Articles: {b.total_articles}</div>
                        <div style={{ fontSize: 9, color: "#555" }}>Corrections: {b.corrections}</div>
                        <div style={{ fontSize: 11, color: b.overconfident ? "#FF3B30" : "#34C759", fontWeight: 600 }}>
                          Actual: {(b.actual_accuracy * 100).toFixed(0)}%
                        </div>
                        {b.overconfident && <div style={{ fontSize: 8, color: "#FF9500" }}>⚠ overconfident</div>}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Signal Word Misfires */}
              {accuracyData.signal_word_misfires && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Signal Word Misfires ({accuracyData.signal_word_misfires.total_corrections_analyzed} corrections analyzed)</div>
                  {accuracyData.signal_word_misfires.adjustments.length > 0 ? (
                    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                      {accuracyData.signal_word_misfires.adjustments.map((adj, i) => (
                        <div key={i} style={{ background: "#0F0F18", borderRadius: 6, padding: 10, border: "1px solid #1A1A25", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div>
                            <span style={{ fontSize: 11, color: adj.current_type === "positive" ? "#34C759" : "#FF3B30", fontWeight: 600 }}>"{adj.word}"</span>
                            <span style={{ fontSize: 9, color: "#555", marginLeft: 8 }}>misfired {adj.misfire_count}x as {adj.current_type}</span>
                          </div>
                          <span style={{ fontSize: 9, color: "#FF9500" }}>⚠ recommend weight reduction</span>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div style={{ fontSize: 11, color: "#555", padding: 10 }}>No misfiring words detected yet. Keep correcting alerts to build data.</div>
                  )}
                </div>
              )}

              {/* Source Accuracy */}
              {accuracyData.source_accuracy && Object.keys(accuracyData.source_accuracy).length > 0 && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Source Error Rates</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {Object.entries(accuracyData.source_accuracy).map(([id, s]) => (
                      <div key={id} style={{ background: "#0F0F18", borderRadius: 6, padding: 10, border: "1px solid #1A1A25", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                        <div>
                          <span style={{ fontSize: 11, color: "#E8E8ED", fontWeight: 500 }}>{s.name}</span>
                          <span style={{ fontSize: 9, color: "#555", marginLeft: 8 }}>{s.total_articles} articles</span>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <span style={{ fontSize: 11, color: s.error_rate > 0.2 ? "#FF3B30" : s.error_rate > 0.1 ? "#FF9500" : "#34C759", fontWeight: 600 }}>
                            {(s.accuracy * 100).toFixed(0)}% accurate
                          </span>
                          <span style={{ fontSize: 9, color: "#555", marginLeft: 6 }}>{s.corrections} corrections</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Disagreement Examples */}
              {accuracyData.disagreement_outcomes?.examples && accuracyData.disagreement_outcomes.examples.length > 0 && (
                <div style={{ marginBottom: 24 }}>
                  <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Recent Disagreement Examples</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {accuracyData.disagreement_outcomes.examples.map((ex, i) => (
                      <div key={i} style={{ background: "#0F0F18", borderRadius: 6, padding: 10, border: "1px solid #1A1A25", fontSize: 10 }}>
                        <span style={{ color: "#555" }}>AI said </span>
                        <span style={{ color: ex.correct_was === ex.ai_said ? "#34C759" : "#FF3B30", fontWeight: 600 }}>{ex.ai_said}</span>
                        <span style={{ color: "#555" }}> · Words said </span>
                        <span style={{ color: ex.correct_was === ex.words_said ? "#34C759" : "#FF3B30", fontWeight: 600 }}>{ex.words_said}</span>
                        <span style={{ color: "#555" }}> · Correct was </span>
                        <span style={{ color: "#E8E8ED", fontWeight: 600 }}>{ex.correct_was}</span>
                        <span style={{ color: "#444", marginLeft: 8 }}>({ex.source} / {ex.keyword})</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Instructions */}
              <div style={{ background: "#0F0F18", borderRadius: 8, padding: 16, border: "1px solid #1A1A25", fontSize: 11, color: "#555", lineHeight: 1.6 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 1, marginBottom: 8, textTransform: "uppercase" }}>How to improve accuracy</div>
                1. Use the 👍 ➡️ 👎 buttons on alerts to correct wrong classifications<br/>
                2. After 10+ corrections, this dashboard starts showing patterns<br/>
                3. Click "Auto-Recalibrate Weights" to reduce weights on misfiring signal words<br/>
                4. Over time, the ensemble learns which method (AI vs words) is more reliable for each source and keyword
              </div>
            </>)}
          </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
