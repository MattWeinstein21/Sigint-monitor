<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGINT – Keyword Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0F;color:#E8E8ED;font-family:'JetBrains Mono','Fira Code',monospace}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0A0A0F}::-webkit-scrollbar-thumb{background:#2A2A35;border-radius:3px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
  .alert-row{animation:slideIn .3s ease-out}.alert-row:hover{background:#14141F!important}
  .kw-tag{transition:all .15s;cursor:pointer}.kw-tag:hover{transform:scale(1.05);filter:brightness(1.3)}
  .src-toggle{transition:all .15s;cursor:pointer}.src-toggle:hover{filter:brightness(1.2)}
  .btn{transition:all .15s;cursor:pointer;border:none}.btn:hover{filter:brightness(1.2);transform:translateY(-1px)}
  .src-link{color:#5A8FD4;text-decoration:none;font-size:10px;font-family:inherit;transition:color .15s;display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;background:#5A8FD412;border:1px solid #5A8FD422}
  .src-link:hover{color:#A0C8FF;background:#5A8FD425;text-decoration:none}
  select{appearance:none;-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = `${window.location.protocol}//${window.location.hostname}:${window.location.port || 5000}`;

const SOURCES = [
  // Social
  { id: "truthsocial", name: "Truth Social", icon: "📢", type: "social", color: "#5448C8" },
  { id: "x_twitter", name: "X / Twitter", icon: "𝕏", type: "social", color: "#1DA1F2" },
  // Major News
  { id: "reuters", name: "Reuters", icon: "◉", type: "news", color: "#FF8000" },
  { id: "ap_news", name: "AP News", icon: "◆", type: "news", color: "#E4002B" },
  { id: "bloomberg", name: "Bloomberg", icon: "▮", type: "news", color: "#472F92" },
  { id: "cnbc", name: "CNBC", icon: "▶", type: "news", color: "#005594" },
  { id: "wsj", name: "Wall Street Journal", icon: "▣", type: "news", color: "#0274B6" },
  { id: "foxnews", name: "Fox News", icon: "★", type: "news", color: "#003366" },
  { id: "cnn", name: "CNN", icon: "◼", type: "news", color: "#CC0000" },
  { id: "nytimes", name: "New York Times", icon: "⬡", type: "news", color: "#888" },
  { id: "ft", name: "Financial Times", icon: "▤", type: "news", color: "#FCD0A1" },
  { id: "marketwatch", name: "MarketWatch", icon: "◈", type: "news", color: "#16A085" },
  { id: "yahoo_finance", name: "Yahoo Finance", icon: "◇", type: "news", color: "#6001D2" },
  { id: "google_news", name: "Google News", icon: "●", type: "news", color: "#4285F4" },
  { id: "newsapi", name: "NewsAPI", icon: "◈", type: "news", color: "#4A90D9" },
  // Government
  { id: "whitehouse", name: "White House", icon: "🏛", type: "gov", color: "#002868" },
  { id: "sec_edgar", name: "SEC EDGAR", icon: "📋", type: "gov", color: "#004B87" },
  { id: "federal_register", name: "Federal Register", icon: "📜", type: "gov", color: "#8B4513" },
  { id: "congress", name: "Congress.gov", icon: "🏛", type: "gov", color: "#1C3F6E" },
  { id: "fed_reserve", name: "Federal Reserve", icon: "🏦", type: "gov", color: "#2E5090" },
  { id: "treasury", name: "U.S. Treasury", icon: "💵", type: "gov", color: "#1B5E20" },
  // Energy / Commodities
  { id: "eia", name: "EIA Energy", icon: "⚡", type: "energy", color: "#F4A300" },
  { id: "opec", name: "OPEC", icon: "🛢", type: "energy", color: "#1A237E" },
  // Crypto
  { id: "coindesk", name: "CoinDesk", icon: "₿", type: "crypto", color: "#F7931A" },
  { id: "cointelegraph", name: "CoinTelegraph", icon: "₿", type: "crypto", color: "#27AE60" },
];

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 0) return "just now";
  if (s < 60) return s + "s ago";
  if (s < 3600) return Math.floor(s / 60) + "m ago";
  if (s < 86400) return Math.floor(s / 3600) + "h ago";
  return Math.floor(s / 86400) + "d ago";
}

function App() {
  const [keywords, setKeywords] = useState([]);
  const [newKeyword, setNewKeyword] = useState("");
  const [alerts, setAlerts] = useState([]);
  const [filter, setFilter] = useState("all");
  const [severityFilter, setSeverityFilter] = useState("all");
  const [isMonitoring, setIsMonitoring] = useState(true);
  const [showConfig, setShowConfig] = useState(false);
  const [enabledSources, setEnabledSources] = useState(SOURCES.map(s => s.id));
  const [backendConnected, setBackendConnected] = useState(false);
  const [lastError, setLastError] = useState("");
  const [accounts, setAccounts] = useState([]);
  const [newAccountUrl, setNewAccountUrl] = useState("");
  const [accountError, setAccountError] = useState("");
  const [refreshing, setRefreshing] = useState(false);
  const [sentimentFilter, setSentimentFilter] = useState("all");
  const [signalSets, setSignalSets] = useState({});
  const [configTab, setConfigTab] = useState("general");
  const [expandedAlerts, setExpandedAlerts] = useState(new Set());
  const [newSignalWord, setNewSignalWord] = useState("");
  const [newSignalSet, setNewSignalSet] = useState("");
  const [newSignalSentiment, setNewSignalSentiment] = useState("positive");
  const [mainView, setMainView] = useState("alerts"); // "alerts" | "market"
  const [indices, setIndices] = useState({});
  const [watchlist, setWatchlist] = useState([]);
  const [watchlistQuotes, setWatchlistQuotes] = useState({});
  const [newSymbol, setNewSymbol] = useState("");
  const [selectedStock, setSelectedStock] = useState(null);
  const [selectedRange, setSelectedRange] = useState("1d");
  const [chatQuestion, setChatQuestion] = useState("");
  const [chatAlertId, setChatAlertId] = useState(null);
  const [chatAnswer, setChatAnswer] = useState("");
  const [chatLoading, setChatLoading] = useState(false);
  const [csvSetId, setCsvSetId] = useState("custom");
  const [csvNewLabel, setCsvNewLabel] = useState("");
  const [, setTick] = useState(0);

  // Load keywords + accounts from backend on mount
  useEffect(() => {
    fetch(API_BASE + "/api/keywords")
      .then(r => r.json())
      .then(d => { if (d.keywords) setKeywords(d.keywords); setBackendConnected(true); })
      .catch(() => setBackendConnected(false));
    fetch(API_BASE + "/api/accounts")
      .then(r => r.json())
      .then(d => { if (d.accounts) setAccounts(d.accounts); })
      .catch(() => {});
    fetch(API_BASE + "/api/signal-sets")
      .then(r => r.json())
      .then(d => { if (d.sets) setSignalSets(d.sets); })
      .catch(() => {});
  }, []);

  // Poll backend status
  useEffect(() => {
    const iv = setInterval(() => {
      fetch(API_BASE + "/api/status")
        .then(r => { if (r.ok) { setBackendConnected(true); setLastError(""); } else throw new Error(); })
        .catch(() => { setBackendConnected(false); setLastError("Cannot reach backend"); });
    }, 15000);
    return () => clearInterval(iv);
  }, []);

  // Poll alerts
  useEffect(() => {
    if (!isMonitoring) return;
    let cancelled = false;
    const poll = () => {
      fetch(API_BASE + "/api/alerts?limit=300")
        .then(r => r.json())
        .then(d => { if (!cancelled && d.alerts) { setAlerts(d.alerts); setBackendConnected(true); } })
        .catch(() => { if (!cancelled) setBackendConnected(false); });
    };
    poll();
    const iv = setInterval(poll, 8000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [isMonitoring]);

  // Timestamp refresh
  useEffect(() => { const iv = setInterval(() => setTick(t => t + 1), 10000); return () => clearInterval(iv); }, []);

  const addKeyword = useCallback(() => {
    const k = newKeyword.trim().toLowerCase();
    if (!k || keywords.includes(k)) return;
    setKeywords(prev => [...prev, k]);
    setNewKeyword("");
    fetch(API_BASE + "/api/keywords", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ add: k })
    }).catch(() => {});
  }, [newKeyword, keywords]);

  const removeKeyword = (k) => {
    setKeywords(prev => prev.filter(x => x !== k));
    fetch(API_BASE + "/api/keywords", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ remove: k })
    }).catch(() => {});
  };

  const addAccount = useCallback(() => {
    const url = newAccountUrl.trim();
    if (!url) return;
    setAccountError("");
    fetch(API_BASE + "/api/accounts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url })
    })
      .then(r => r.json())
      .then(d => {
        if (d.error) { setAccountError(d.error); return; }
        if (d.accounts) setAccounts(d.accounts);
        setNewAccountUrl("");
      })
      .catch(() => setAccountError("Backend unreachable"));
  }, [newAccountUrl]);

  const removeAccount = (platform, username) => {
    fetch(API_BASE + "/api/accounts", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ remove: platform + ":" + username })
    })
      .then(r => r.json())
      .then(d => { if (d.accounts) setAccounts(d.accounts); })
      .catch(() => {});
  };

  const triggerRefresh = () => {
    if (refreshing) return;
    setRefreshing(true);
    fetch(API_BASE + "/api/refresh", { method: "POST" })
      .then(() => {
        // Wait a few seconds for the poll cycle to run, then fetch new alerts
        setTimeout(() => {
          fetch(API_BASE + "/api/alerts?limit=300")
            .then(r => r.json())
            .then(d => { if (d.alerts) setAlerts(d.alerts); })
            .catch(() => {})
            .finally(() => setRefreshing(false));
        }, 5000);
      })
      .catch(() => setRefreshing(false));
  };

  const toggleSource = (id) => setEnabledSources(prev =>
    prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
  );

  const toggleExpand = (id) => setExpandedAlerts(prev => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });

  const toggleSignalSet = (setId) => {
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ toggle: setId })
    }).then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); }).catch(() => {});
  };

  const addSignalWord = () => {
    const word = newSignalWord.trim().toLowerCase();
    if (!word || !newSignalSet) return;
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: newSignalSet, sentiment: newSignalSentiment, add: word, weight: 2 })
    }).then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); setNewSignalWord(""); }).catch(() => {});
  };

  const removeSignalWord = (setId, sentiment, word) => {
    fetch(API_BASE + "/api/signal-sets", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: setId, sentiment, remove: word })
    }).then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); }).catch(() => {});
  };

  const editSignalWeight = (setId, sentiment, word, newWeight) => {
    fetch(API_BASE + "/api/signal-sets/edit-weight", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ set_id: setId, sentiment, word, weight: parseFloat(newWeight) })
    }).then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); }).catch(() => {});
  };

  // Market data
  const [assetType, setAssetType] = useState("stock");
  const [addError, setAddError] = useState("");
  const [addingSymbol, setAddingSymbol] = useState(false);
  const [marketNews, setMarketNews] = useState([]);
  const [stockNews, setStockNews] = useState([]);
  const [marketNewsSources, setMarketNewsSources] = useState({});

  useEffect(() => {
    if (mainView !== "market") return;
    const loadMarket = () => {
      fetch(API_BASE + "/api/market/indices?range=" + selectedRange + "&interval=" + (selectedRange === "1d" ? "5m" : selectedRange === "5d" ? "15m" : "1d"))
        .then(r => r.json()).then(d => { if (d.indices) setIndices(d.indices); }).catch(() => {});
      fetch(API_BASE + "/api/market/watchlist")
        .then(r => r.json()).then(d => {
          if (d.watchlist) setWatchlist(d.watchlist);
          if (d.quotes) setWatchlistQuotes(d.quotes);
        }).catch(() => {});
      fetch(API_BASE + "/api/market/news")
        .then(r => r.json()).then(d => { if (d.articles) setMarketNews(d.articles); }).catch(() => {});
      fetch(API_BASE + "/api/market/news-sources")
        .then(r => r.json()).then(d => { if (d.sources) setMarketNewsSources(d.sources); }).catch(() => {});
    };
    loadMarket();
    const iv = setInterval(loadMarket, 60000);
    return () => clearInterval(iv);
  }, [mainView, selectedRange]);

  const addToWatchlist = () => {
    const sym = newSymbol.trim().toUpperCase();
    if (!sym) return;
    setAddingSymbol(true); setAddError("");
    fetch(API_BASE + "/api/market/watchlist", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ add: sym, type: assetType })
    }).then(r => r.json()).then(d => {
      if (d.error) { setAddError(d.error); setAddingSymbol(false); return; }
      if (d.watchlist) setWatchlist(d.watchlist);
      setNewSymbol(""); setAddingSymbol(false);
      // Fetch quote for the new symbol
      fetch(API_BASE + "/api/market/quote/" + sym + "?type=" + assetType + "&range=" + selectedRange)
        .then(r => r.json()).then(qd => { if (qd.quote) setWatchlistQuotes(prev => ({...prev, [sym]: qd.quote})); }).catch(() => {});
    }).catch(() => { setAddError("Network error"); setAddingSymbol(false); });
  };

  const removeFromWatchlist = (sym) => {
    fetch(API_BASE + "/api/market/watchlist", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ remove: sym }) })
      .then(r => r.json()).then(d => { if (d.watchlist) setWatchlist(d.watchlist); }).catch(() => {});
    setWatchlistQuotes(prev => { const n = {...prev}; delete n[sym]; return n; });
    if (selectedStock === sym) setSelectedStock(null);
  };

  const selectStock = (sym) => {
    const item = watchlist.find(w => w.symbol === sym);
    const atype = item ? item.type : "stock";
    setSelectedStock(selectedStock === sym ? null : sym);
    setStockNews([]);
    fetch(API_BASE + "/api/market/quote/" + sym + "?type=" + atype + "&range=" + selectedRange + "&interval=" + (selectedRange === "1d" ? "5m" : selectedRange === "5d" ? "15m" : "1d"))
      .then(r => r.json()).then(d => { if (d.quote) setWatchlistQuotes(prev => ({...prev, [sym]: d.quote})); }).catch(() => {});
    // Fetch news for this symbol
    fetch(API_BASE + "/api/market/news?symbol=" + sym)
      .then(r => r.json()).then(d => { if (d.articles) setStockNews(d.articles); }).catch(() => {});
  };

  const toggleMarketNewsSource = (srcId) => {
    fetch(API_BASE + "/api/market/news-sources", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ toggle: srcId }) })
      .then(r => r.json()).then(d => { if (d.sources) setMarketNewsSources(d.sources); }).catch(() => {});
  };

  // Ollama chat
  const askFollowUp = (alertId) => {
    if (!chatQuestion.trim()) return;
    setChatLoading(true); setChatAlertId(alertId); setChatAnswer("");
    fetch(API_BASE + "/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ alert_id: alertId, question: chatQuestion }) })
      .then(r => r.json()).then(d => { setChatAnswer(d.answer || d.error || "No response"); setChatLoading(false); })
      .catch(() => { setChatAnswer("Failed to reach Ollama"); setChatLoading(false); });
  };

  // CSV import
  const importCsv = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const formData = new FormData();
    formData.append("file", file);
    formData.append("set_id", csvSetId === "__new__" ? "__new__" : csvSetId);
    if (csvSetId === "__new__") formData.append("new_set_label", csvNewLabel);
    fetch(API_BASE + "/api/signal-sets/import", { method: "POST", body: formData })
      .then(r => r.json()).then(d => { if (d.sets) setSignalSets(d.sets); e.target.value = ""; }).catch(() => {});
  };

  // Mini sparkline SVG component
  const Sparkline = ({data, width, height, color}) => {
    if (!data || data.length < 2) return null;
    const vals = data.map(d => d.close);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min || 1;
    const points = vals.map((v, i) => `${(i / (vals.length - 1)) * width},${height - ((v - min) / range) * height}`).join(" ");
    return <svg width={width} height={height} style={{display:"block"}}><polyline points={points} fill="none" stroke={color} strokeWidth="1.5"/></svg>;
  };

  const filtered = alerts.filter(a => {
    if (filter !== "all" && a.keyword !== filter) return false;
    if (severityFilter !== "all" && a.severity !== severityFilter) return false;
    if (sentimentFilter !== "all" && a.sentiment !== sentimentFilter) return false;
    return enabledSources.includes(a.source);
  });

  const sevColors = { high: "#FF3B30", medium: "#FF9500", low: "#34C759" };
  const sentColors = { positive: "#34C759", negative: "#FF3B30", neutral: "#8E8E93" };
  const sentIcons = { positive: "📈", negative: "📉", neutral: "➡️" };
  const srcMap = Object.fromEntries(SOURCES.map(s => [s.id, s]));

  return (
    <div style={{ minHeight: "100vh" }}>
      {/* Header */}
      <div style={{ borderBottom: "1px solid #1A1A25", padding: "16px 24px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, background: "#0A0A0F", zIndex: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 10, height: 10, borderRadius: "50%", background: isMonitoring ? "#34C759" : "#FF3B30", animation: isMonitoring ? "pulse 2s infinite" : "none" }} />
          <span style={{ fontFamily: "'Space Grotesk',sans-serif", fontWeight: 700, fontSize: 18, letterSpacing: "-0.5px" }}>SIGINT</span>
          <span style={{ fontSize: 11, color: "#555", marginLeft: 4 }}>keyword monitor</span>
          <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 4, marginLeft: 8, background: backendConnected ? "#1A2A1A" : "#2A1A1A", color: backendConnected ? "#34C759" : "#FF3B30", border: "1px solid " + (backendConnected ? "#34C75933" : "#FF3B3033") }}>
            {backendConnected ? "● CONNECTED" : "✕ DISCONNECTED"}
          </span>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button className="btn" onClick={() => setMainView("alerts")} style={{ background: mainView === "alerts" ? "#5448C8" : "#14141F", color: mainView === "alerts" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>📋 Alerts</button>
          <button className="btn" onClick={() => setMainView("market")} style={{ background: mainView === "market" ? "#5448C8" : "#14141F", color: mainView === "market" ? "#fff" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>📊 Markets</button>
          <button className="btn" onClick={triggerRefresh} disabled={refreshing} style={{ background: refreshing ? "#2A2A35" : "#14141F", color: refreshing ? "#666" : "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12, opacity: refreshing ? 0.7 : 1 }}>
            {refreshing ? "⟳ Polling..." : "⟳ Refresh"}
          </button>
          <button className="btn" onClick={() => setShowConfig(!showConfig)} style={{ background: showConfig ? "#2A2A35" : "#14141F", color: "#AAA", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>⚙ Config</button>
          <button className="btn" onClick={() => setIsMonitoring(!isMonitoring)} style={{ background: isMonitoring ? "#1A2A1A" : "#2A1A1A", color: isMonitoring ? "#34C759" : "#FF3B30", padding: "6px 14px", borderRadius: 6, fontSize: 12 }}>
            {isMonitoring ? "● LIVE" : "■ PAUSED"}
          </button>
        </div>
      </div>

      {/* Connection error banner */}
      {!backendConnected && (
        <div style={{ background: "#2A1A1A", borderBottom: "1px solid #FF3B3033", padding: "8px 24px", fontSize: 11, color: "#FF6B6B" }}>
          ⚠ Backend not reachable at {API_BASE} — make sure monitor.py is running.
        </div>
      )}

      <div style={{ display: "flex", height: backendConnected ? "calc(100vh - 57px)" : "calc(100vh - 89px)" }}>
        {/* Sidebar */}
        <div style={{ width: showConfig ? 360 : 0, overflow: "hidden", transition: "width 0.3s", borderRight: "1px solid #1A1A25", flexShrink: 0 }}>
          <div style={{ width: 360, padding: 0, overflowY: "auto", height: "100%" }}>
            {/* Config tabs */}
            <div style={{ display: "flex", borderBottom: "1px solid #1A1A25" }}>
              {[{id:"general",label:"General"},{id:"signals",label:"Signal Words"},{id:"sources",label:"Sources"}].map(tab => (
                <button key={tab.id} className="btn" onClick={() => setConfigTab(tab.id)} style={{ flex: 1, padding: "8px 0", fontSize: 10, letterSpacing: 1, textTransform: "uppercase", background: configTab === tab.id ? "#14141F" : "transparent", color: configTab === tab.id ? "#E8E8ED" : "#555", borderBottom: configTab === tab.id ? "2px solid #5448C8" : "2px solid transparent" }}>{tab.label}</button>
              ))}
            </div>

            <div style={{ padding: 16 }}>
            {configTab === "general" && (<>
              {/* Keywords */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>Keywords ({keywords.length})</div>
                <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>

                <button className="btn" onClick={() => setAssetType("crypto")} style={{ padding: "6px 12px", fontSize: 11, background: assetType === "crypto" ? "#F7931A" : "#14141F", color: assetType === "crypto" ? "#fff" : "#AAA", borderRadius: 0 }}>Crypto</button>
              </div>
              <input value={newSymbol} onChange={e => { setNewSymbol(e.target.value.toUpperCase()); setAddError(""); }} onKeyDown={e => e.key === "Enter" && addToWatchlist()} placeholder={assetType === "crypto" ? "BTC, ETH, SOL..." : "AAPL, TSLA, MSFT..."} style={{ flex: 1, maxWidth: 220, background: "#14141F", border: "1px solid #2A2A35", borderRadius: 6, padding: "6px 10px", color: "#E8E8ED", fontSize: 12, outline: "none", fontFamily: "inherit" }} />
              <button className="btn" onClick={addToWatchlist} disabled={addingSymbol} style={{ background: "#5448C8", color: "#fff", padding: "6px 14px", borderRadius: 6, fontSize: 12, opacity: addingSymbol ? 0.5 : 1 }}>{addingSymbol ? "..." : "+"}</button>
            </div>
            {addError && <div style={{ fontSize: 10, color: "#FF3B30", marginBottom: 10 }}>⚠ {addError}</div>}

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10, marginBottom: 24 }}>
              {watchlist.map(item => {
                const sym = item.symbol;
                const q = watchlistQuotes[sym];
                if (!q) return <div key={sym} style={{ background: "#0F0F18", borderRadius: 8, padding: 14, border: "1px solid #1A1A25", color: "#555", fontSize: 11 }}>{item.type === "crypto" ? "₿" : "📊"} {sym} — loading...</div>;
                const isUp = q.change >= 0;
                const isSelected = selectedStock === sym;
                return (
                  <div key={sym} className="src-toggle" onClick={() => selectStock(sym)} style={{ background: isSelected ? "#14141F" : "#0F0F18", borderRadius: 8, padding: 14, border: isSelected ? "1px solid #5448C8" : "1px solid #1A1A25", cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                      <div>
                        <span style={{ fontSize: 14, fontWeight: 700, color: "#E8E8ED" }}>{q.type === "crypto" ? "₿ " : ""}{sym}</span>
                        <span style={{ fontSize: 10, color: "#555", marginLeft: 6 }}>{q.name}</span>
                      </div>
                      <span className="kw-tag" onClick={e => { e.stopPropagation(); removeFromWatchlist(sym); }} style={{ fontSize: 10, color: "#555", padding: "2px 4px" }}>✕</span>
                    </div>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8 }}>
                      <span style={{ fontSize: 20, fontWeight: 700, color: "#E8E8ED", fontFamily: "'Space Grotesk',sans-serif" }}>${q.price?.toLocaleString()}</span>
                      <span style={{ fontSize: 12, color: isUp ? "#34C759" : "#FF3B30", fontWeight: 600 }}>
                        {isUp ? "▲" : "▼"} {q.change > 0 ? "+" : ""}{q.change} ({q.change_pct > 0 ? "+" : ""}{q.change_pct}%)
                      </span>
                    </div>
                    <Sparkline data={q.chart} width={250} height={50} color={isUp ? "#34C759" : "#FF3B30"} />
                    {isSelected && (
                      <div style={{ marginTop: 10 }}>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 10 }}>
                          {[
                            ["Day High", "$" + q.day_high], ["Day Low", "$" + q.day_low],
                            ["Volume", (q.volume || 0).toLocaleString()], ["Prev Close", "$" + q.prev_close],
                            ["52w High", "$" + q.fifty_two_wk_high], ["52w Low", "$" + q.fifty_two_wk_low],
                            ["Exchange", q.exchange],
                            ["Mkt Cap", q.market_cap ? (q.market_cap > 1e12 ? (q.market_cap/1e12).toFixed(1)+"T" : q.market_cap > 1e9 ? (q.market_cap/1e9).toFixed(1)+"B" : (q.market_cap/1e6).toFixed(0)+"M") : "N/A"],
                          ].map(([l,v]) => (
                            <div key={l} style={{ fontSize: 10 }}><span style={{ color: "#555" }}>{l}: </span><span style={{ color: "#AAA" }}>{v}</span></div>
                          ))}
                        </div>
                        {/* News for this stock */}
                        {stockNews.length > 0 && (
                          <div style={{ borderTop: "1px solid #1A1A25", paddingTop: 8 }}>
                            <div style={{ fontSize: 9, color: "#666", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>Related News (24h)</div>
                            {stockNews.slice(0, 5).map((n, i) => (
                              <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{ display: "block", fontSize: 10, color: "#AAA", textDecoration: "none", padding: "4px 0", borderBottom: "1px solid #0A0A0F", lineHeight: 1.4 }}>
                                {n.title}
                                <span style={{ fontSize: 8, color: "#555", marginLeft: 6 }}>{n.source} · {n.published_at}</span>
                              </a>
                            ))}
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Market News Feed */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 600, color: "#666", letterSpacing: 2, textTransform: "uppercase" }}>Market News</div>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {Object.entries(marketNewsSources).map(([id, src]) => (
                  <button key={id} className="btn" onClick={() => toggleMarketNewsSource(id)} style={{ fontSize: 8, padding: "2px 6px", borderRadius: 3, background: src.enabled ? "#1A2A1A" : "#14141F", color: src.enabled ? "#34C759" : "#555", border: "1px solid " + (src.enabled ? "#34C75933" : "#2A2A35") }}>{src.name}</button>
                ))}
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {marketNews.slice(0, 15).map((n, i) => (
                <a key={i} href={n.url} target="_blank" rel="noopener noreferrer" style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 10, padding: "8px 10px", background: "#0F0F18", borderRadius: 6, border: "1px solid #1A1A25", textDecoration: "none" }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 12, color: "#E8E8ED", lineHeight: 1.3 }}>{n.title}</div>
                    {n.summary && <div style={{ fontSize: 10, color: "#555", marginTop: 3 }}>{n.summary}</div>}
                  </div>
                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                    <div style={{ fontSize: 9, color: "#5448C8" }}>{n.source}</div>
                    <div style={{ fontSize: 8, color: "#555" }}>{n.published_at}</div>
                  </div>
                </a>
              ))}
              {marketNews.length === 0 && <div style={{ color: "#333", fontSize: 11, padding: 20, textAlign: "center" }}>Loading market news...</div>}
            </div>
          </div>
          )}

        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
