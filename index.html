      </div>
      {chatOpen&&<div style={{position:"fixed",bottom:24,right:24,width:420,maxWidth:"calc(100vw - 32px)",height:520,maxHeight:"calc(100vh - 80px)",background:"#0F0F1A",borderRadius:16,border:"1px solid #1C1C28",display:"flex",flexDirection:"column",zIndex:50,boxShadow:"0 12px 48px rgba(0,0,0,0.6)"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid #1C1C28",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#EDEDF0"}}>SIGINT AI</div>
            <div style={{fontSize:10,color:"#7A7A8E",fontFamily:"'JetBrains Mono',monospace"}}>Ask about markets, news, trends</div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="b" onClick={function(){sGcMsgs([]);tt("Chat cleared")}} style={{fontSize:10,color:"#7A7A8E",background:"none",padding:"4px 8px",border:"1px solid #1C1C28",borderRadius:5}}>Clear</button>
            <button className="b" onClick={function(){sChatOpen(false)}} style={{fontSize:14,color:"#7A7A8E",background:"none",padding:"4px 8px",lineHeight:1}}>x</button>
          </div>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
          {gcMsgs.length===0&&<div style={{padding:"30px 0",textAlign:"center"}}>
            <div style={{fontSize:10,color:"#7A7A8E",marginBottom:16,fontFamily:"'JetBrains Mono',monospace"}}>Suggested questions:</div>
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {["What are the key headlines today?","What is the market sentiment right now?","Summarize the latest news on tariffs","Any bearish signals to watch?"].map(function(q,i){return <button key={i} className="b" onClick={function(){sGcInput(q)}} style={{padding:"10px 12px",background:"#141420",color:"#EDEDF0",borderRadius:8,fontSize:11,textAlign:"left",border:"1px solid #1C1C28"}}>{q}</button>})}
            </div>
          </div>}
          {gcMsgs.map(function(m,i){return <div key={i} className="cm" style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            <div style={{maxWidth:"85%",padding:"9px 13px",borderRadius:m.role==="user"?"12px 12px 2px 12px":"12px 12px 12px 2px",background:m.role==="user"?"#5448C8":"#141420",color:m.role==="user"?"#fff":"#EDEDF0",fontSize:12,lineHeight:1.6,border:m.role==="user"?"none":"1px solid #1C1C28",whiteSpace:"pre-wrap"}}>
              {m.role==="ai"&&<div style={{fontSize:9,color:"#8B80F0",marginBottom:4,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>SIGINT AI{m.meta||""}</div>}
              {m.text}
            </div>
          </div>})}
          {gcLoading&&<div className="cm" style={{display:"flex"}}><div style={{padding:"9px 13px",borderRadius:"12px 12px 12px 2px",background:"#141420",border:"1px solid #1C1C28",fontSize:12,color:"#8B80F0",fontFamily:"'JetBrains Mono',monospace"}}><span className="thk">Thinking</span></div></div>}
        </div>
        <div style={{padding:"12px 16px",borderTop:"1px solid #1C1C28",flexShrink:0}}>
          <div style={{display:"flex",gap:8}}>
            <input value={gcInput} onChange={function(e){sGcInput(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter"&&!e.shiftKey)sendGcMsg()}} placeholder="Ask about news, markets, trends..." disabled={gcLoading} style={{flex:1,background:"#07070E",border:"1px solid #242434",borderRadius:8,padding:"10px 12px",color:"#EDEDF0",fontSize:12,outline:"none"}}/>
            <button className="b" onClick={sendGcMsg} disabled={gcLoading} style={{background:"#5448C8",color:"#fff",padding:"10px 18px",borderRadius:8,fontSize:12,fontWeight:700}}>Send</button>
          </div>
        </div>
      </div>}
    </div>;
  };

  /* ===== MAIN RENDER ===== */
  return <div style={{height:"100vh",display:"flex",flexDirection:"column",overflow:"hidden"}}>
    {/* Toast */}
    {toast&&<div style={{position:"fixed",top:16,right:16,zIndex:100,background:"#0F0F1A",color:"#30D158",padding:"10px 18px",borderRadius:8,fontSize:12,border:"1px solid #30D15830",animation:"slideIn 0.2s ease-out",boxShadow:"0 4px 16px rgba(0,0,0,0.4)"}}>{toast}</div>}

    {/* Modals */}
    {renderCorrectionModal()}
    {renderStockModal()}

    {/* Fixed header */}
    <div style={{height:52,flexShrink:0,background:"#07070E",borderBottom:"1px solid #1C1C28",display:"flex",alignItems:"center",zIndex:20,position:"relative"}}>
      {/* Left: nav toggle placeholder */}
      <div style={{width:SIDEBAR_W,flexShrink:0,display:"flex",alignItems:"center",paddingLeft:16,transition:"width 0.2s"}}>
        {sideExpanded&&<span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:18,color:"#EDEDF0",letterSpacing:-0.5}}>SIGINT</span>}
        {!sideExpanded&&<span style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:14,color:"#5448C8"}}>SI</span>}
      </div>
      {/* Center: clock + status */}
      <div style={{flex:1,display:"flex",justifyContent:"center",alignItems:"center",gap:12}}>
        <Clock tz={userTz}/>
        <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:7,background:"#0F0F1A",border:"1px solid #1C1C28"}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:conn?"#30D158":"#FF453A"}}/>
          <span style={{fontSize:10,color:conn?"#30D158":"#FF453A",fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{conn?"LIVE":"OFFLINE"}</span>
        </div>
      </div>
      {/* Right: refresh + live/stop */}
      <div style={{display:"flex",gap:6,alignItems:"center",paddingRight:16,flexShrink:0}}>
        <button className="b" onClick={function(){sRef(true);fetch(API+"/api/refresh",{method:"POST"}).then(function(){setTimeout(function(){F("/api/alerts?limit=300&sort="+(alertSortRef.current||"time")).then(function(d){if(d.alerts)sAl(d.alerts)}).catch(function(){});sRef(false)},3000)}).catch(function(){sRef(false)})}} style={{background:"#0F0F1A",color:"#7A7A8E",padding:"7px 12px",borderRadius:7,fontSize:11,border:"1px solid #1C1C28",display:"flex",alignItems:"center",gap:5}}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style={{animation:ref?"spin 1s linear infinite":"none"}}><path d="M11 6A5 5 0 1 1 8.5 1.8" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"/><polyline points="8,0 8.5,2.5 11,2" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Refresh
        </button>
        <button className="b" onClick={function(){sMon(!mon)}} style={{background:mon?"#30D15818":"#FF453A18",color:mon?"#30D158":"#FF453A",padding:"7px 14px",borderRadius:7,fontSize:11,border:"1px solid "+(mon?"#30D15830":"#FF453A30"),fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>
          {mon?"LIVE":"STOP"}
        </button>
      </div>
    </div>

    {/* Body row */}
    <div style={{flex:1,display:"flex",overflow:"hidden"}}>
      {/* Sidebar */}
      {renderNavSidebar()}
      {/* Settings drawer */}
      {renderSettingsDrawer()}
      {/* Main content */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
        {!conn&&<div style={{background:"#2A141A",borderBottom:"1px solid #FF453A25",padding:"6px 20px",fontSize:11,color:"#FF453A",flexShrink:0,fontFamily:"'JetBrains Mono',monospace"}}>Backend not reachable — check that SIGINT server is running</div>}
        <div style={{display:mv==="alerts"?"flex":"none",flex:1,flexDirection:"column",minHeight:0,overflow:"hidden"}}>{renderAlertsPage()}</div>
        <div style={{display:mv==="market"?"flex":"none",flex:1,flexDirection:"column",minHeight:0,overflow:"hidden"}}>{renderMarketsPage()}</div>
        <div style={{display:mv==="economy"?"flex":"none",flex:1,flexDirection:"column",minHeight:0,overflow:"hidden"}}>{renderEconomyPage()}</div>
        <div style={{display:mv==="analytics"?"flex":"none",flex:1,flexDirection:"column",minHeight:0,overflow:"hidden"}}>{renderAnalyticsPage()}</div>
      </div>
    </div>

    {/* Floating Chat */}
    {renderFloatingChat()}

    {/* Version badge */}
    <div style={{position:"fixed",bottom:8,left:SIDEBAR_W+10,zIndex:5,pointerEvents:"none"}}>
      <span style={{fontSize:9,color:"#1C1C28",fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.05em",userSelect:"none"}}>SIGINT v2.0.7 · 2026-04-15</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
